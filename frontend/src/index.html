<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>XF Internal Linker</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Phase E1 / Gap 29 — PWA manifest. Enables "Add to Home Screen" and
         lets the service worker intercept asset + API requests. -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1a73e8">

    <!-- Material Icons font is bundled and served from the same origin
         (see angular.json `styles` → node_modules/material-icons/...).
         No external Google Fonts request, no render-blocking preconnect,
         and no rule violation against `default-theme.scss` (which bans
         Google Fonts imports). -->

    <!-- Speculation Rules API. We deliberately do NOT use `prerender`
         here — prerender executes the page in a hidden tab, which fires
         authenticated `/api/` calls in the background as if the user
         had visited the route, costing real backend load even when the
         user never clicks. `prefetch` only downloads the chunks; the
         actual route work runs after a click, which is what we want.
         `eagerness: conservative` means the browser only prefetches on
         intent-to-click (hover/focus), not every visible link. Ignored
         by Firefox/Safari — they just navigate normally. -->
    <script type="speculationrules">
      {
        "prefetch": [
          {
            "source": "document",
            "where": { "and": [{ "href_matches": "/*" }] },
            "eagerness": "conservative"
          }
        ]
      }
    </script>
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
