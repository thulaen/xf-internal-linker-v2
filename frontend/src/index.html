<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>XF Internal Linker</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Phase E1 / Gap 29 — PWA manifest. Enables "Add to Home Screen" and
         lets the service worker intercept asset + API requests. -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1a73e8">

    <!-- Phase F1 / Gap 90 — Preconnect hints to origins we'll hit early.
         The API origin is same-host in dev/prod, so we prime DNS / TLS
         to Google Fonts plus our own origin for the JSON bootstrap. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="/" />

    <!-- Phase F1 / Gap 91 — Font strategy. `display=swap` prevents FOIT
         (flash of invisible text) during font download; `size-adjust`
         applied via CSS keeps layout stable. Material Icons are loaded
         with swap so the first paint doesn't wait on the icon font. -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
      rel="stylesheet"
    />

    <!-- Phase F1 / Gap 80 — Speculation Rules API. On browsers that
         support it (Chrome 109+, with document-rules behind a flag in
         older builds), prerender the common next-navigations so they
         pop instantly. Conservative `moderate` eagerness means the
         browser only prerenders on intent-to-click (hover/focus), not
         every visible link. Ignored by Firefox/Safari — no fallback
         needed; they just navigate normally. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "source": "list",
            "urls": [
              "/review",
              "/jobs",
              "/health",
              "/alerts",
              "/link-health",
              "/graph",
              "/analytics"
            ]
          }
        ],
        "prefetch": [
          {
            "source": "document",
            "where": { "and": [{ "href_matches": "/*" }] },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
