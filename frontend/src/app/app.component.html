<!-- XF Internal Linker V2 — Main Application Shell -->
<mat-sidenav-container class="app-container">

  <!-- ── Left Sidebar: Navigation ───────────────────────────────── -->
  <mat-sidenav mode="side" opened class="app-sidenav">

    <!-- Logo / Brand -->
    <div class="sidenav-header">
      <mat-icon class="brand-icon">link</mat-icon>
      <span class="brand-name">{{ siteName }}</span>
      <span class="brand-version">v2</span>
    </div>

    <!-- Navigation Links -->
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [matTooltip]="item.tooltip"
          matTooltipPosition="right"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

  </mat-sidenav>

  <!-- ── Right Drawer: Theme Customizer ─────────────────────────── -->
  <mat-sidenav
    position="end"
    [(opened)]="customizerOpen"
    mode="over"
    class="customizer-drawer"
  >
    <app-theme-customizer (close)="customizerOpen = false" />
  </mat-sidenav>

  <!-- ── Main Content Area ──────────────────────────────────────── -->
  <mat-sidenav-content class="app-content">

    <!-- Top Toolbar -->
    <mat-toolbar class="app-toolbar">
      <span>{{ siteName }}</span>
      <span class="toolbar-spacer"></span>
      <button
        mat-icon-button
        matTooltip="Customize appearance"
        (click)="customizerOpen = !customizerOpen"
      >
        <mat-icon>palette</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Open Django Admin" [attr.onclick]="null">
        <mat-icon>admin_panel_settings</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Page Content (routed) -->
    <main class="page-content">
      <router-outlet />
    </main>

    <!-- Footer -->
    @if (config.showFooter) {
      <footer class="app-footer">
        <span>{{ config.footerText }}</span>
      </footer>
    }

  </mat-sidenav-content>

</mat-sidenav-container>

<!-- Scroll to top (outside sidenav container so it overlays everything) -->
@if (config.showScrollToTop) {
  <app-scroll-to-top />
}
