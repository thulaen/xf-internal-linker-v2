<div class="system-summary-card" *ngIf="overview">
  <div class="card-header">
    <div class="title-group">
      <span class="material-icons">monitor_heart</span>
      <h3>System Health</h3>
    </div>
    <a routerLink="/system-health" class="btn-detail">Details</a>
  </div>

  <div class="status-grid">
    <div class="status-item" [class.active]="overview.summary.healthy > 0">
      <span class="count">{{ overview.summary.healthy }}</span>
      <span class="label">Healthy</span>
    </div>
    <div class="status-item failed" [class.active]="overview.summary.failed > 0">
      <span class="count">{{ overview.summary.failed }}</span>
      <span class="label">Failed</span>
    </div>
    <div class="status-item degraded" [class.active]="overview.summary.degraded > 0">
      <span class="count">{{ overview.summary.degraded }}</span>
      <span class="label">Degraded</span>
    </div>
  </div>

  <div class="urgent-issues" *ngIf="overview.top_urgent_issues.length > 0">
    <label>Top Urgent Issues</label>
    <ul class="issue-list">
      <li *ngFor="let issue of overview.top_urgent_issues">
        <span class="material-icons">error_outline</span>
        <span class="issue-text">{{ issue.title }}</span>
      </li>
    </ul>
  </div>
</div>
