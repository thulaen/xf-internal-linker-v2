[mypy]
python_version = 3.12
plugins = mypy_django_plugin.main
# Start strict on new code; expand as existing code is cleaned up.
ignore_missing_imports = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
warn_unreachable = True
no_implicit_reexport = True
strict_equality = True
# Skip migrations, tests, and auto-generated files.
exclude = (?x)(migrations/|tests\.py$|manage\.py$|conftest\.py$)

[mypy.plugins.django-stubs]
django_settings_module = config.settings.test

# Models: strict (pure Python, no DRF/Django view patterns).
[mypy-apps.crawler.models]
disallow_untyped_defs = True
check_untyped_defs = True

# Views/serializers/tasks: check bodies but allow untyped defs
# (DRF/Celery decorators don't carry type info).
[mypy-apps.crawler.views]
check_untyped_defs = True

[mypy-apps.crawler.serializers]
check_untyped_defs = True

[mypy-apps.crawler.tasks]
check_untyped_defs = True
