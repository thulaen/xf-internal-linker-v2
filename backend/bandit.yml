# Bandit security scanning configuration for XF Internal Linker V2.
#
# Runs on every push (via lint-all.ps1) and in CI.
# Skips rules that produce false positives in this project's context.

skips:
  # B101: Use of assert — used legitimately in tests and validation.
  - B101
  # B104: Possible binding to all interfaces — Docker containers bind 0.0.0.0 by design.
  - B104
  # B105: Hardcoded password string — false positive on empty-string defaults and webhook secrets.
  - B105
  # B106: Hardcoded password funcarg — false positive on test fixtures (password="pass")
  #        and Google OAuth token_uri parameters.
  - B106
  # B110: Try/except/pass — used in graceful fallback patterns (e.g., ext_loader).
  - B110
  # B310: urllib.urlopen — only called on controlled internal HTTP Worker URLs, not user input.
  - B310
  # B608: Possible SQL injection via string formatting — Django ORM handles parameterisation.
  #        All raw SQL in this project uses cursor.execute() with parameters.
  - B608
  # B112: Try/except/continue — graceful fallback pattern in batch loops
  #        (embedding providers, BPR ranker, embedding audit/bakeoff).
  - B112
  # B311: random.Random — used for ML sampling, jitter, anchor diversity sims.
  #        Cryptographic-strength PRNG isn't required for any of these uses;
  #        token/secret paths use `secrets` module instead.
  - B311
  # B108: Insecure use of /tmp — only in test/benchmark fixtures that need
  #        a writable scratch dir; never touched in production code.
  - B108
  # B301: Pickle deserialisation — used for FAISS index serialisation and
  #        local-only model caches. Inputs are always trusted file paths
  #        owned by the running process; no user-controlled deserialisation.
  - B301
  # B403: Importing pickle — same justification as B301.
  - B403
  # B404: Importing subprocess — single use in kenlm_fluency.py (documented
  #        below). The module-level import is benign; B603 covers the call.
  - B404
  # B603: subprocess.run — single use in kenlm_fluency.py to invoke the
  #        local kenlm `lmplz` binary on a known scratch path. No shell=True,
  #        argument list is constructed from local paths only, no user input.
  - B603
