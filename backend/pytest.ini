[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --cov=apps
    --cov=config
    --cov-report=term-missing
    --cov-report=html:coverage-html
    # Ratchet — only raise this number, never lower it. Measured at 70% via
    # `coverage run --source=apps,config manage.py test` on 2026-04-28.
    # Floor is set 2 points below measured coverage so a single PR can't
    # accidentally drop us under the gate. Each new test PR raises it.
    --cov-fail-under=68
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring a live database
    unit: marks pure unit tests with no I/O
