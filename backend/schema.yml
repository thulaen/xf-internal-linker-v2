                $ref: '#/components/schemas/WeightPreset'
          description: ''
    delete:
      operationId: weight_presets_destroy
      description: CRUD for weight presets + apply action.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Weight Preset.
        required: true
      tags:
      - weight-presets
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
