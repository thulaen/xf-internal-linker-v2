      - content_type_label
      - content_value_score
      - created_at
      - freshness_bucket
      - id
      - inbound_link_count
      - is_deleted
      - link_freshness_score
      - march_2026_pagerank_score
      - post_date
      - reply_count
      - scope
      - scope_title
      - source_label
      - title
      - updated_at
      - url
      - velocity_score
      - view_count
