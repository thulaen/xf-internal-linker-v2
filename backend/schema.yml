  /api/pipeline-runs/:
    get:
      operationId: api_pipeline_runs_list
      description: |-
        List and retrieve pipeline run history. Also provides a start action.

        GET  /api/pipeline-runs/         — paginated list
        GET  /api/pipeline-runs/{id}/    — full detail with progress
        POST /api/pipeline-runs/start/   — create and dispatch a new pipeline run
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: rerun_mode
        schema:
          type: string
          enum:
          - full_regenerate
          - skip_pending
          - supersede_pending
        description: |-
          Controls how this run handles destinations that already have suggestions.

          * `skip_pending` - Skip Pending — don't replace existing pending suggestions
          * `supersede_pending` - Supersede Pending — replace with new suggestions
          * `full_regenerate` - Full Regenerate — replace all, including approved
      - in: query
        name: run_state
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - failed
          - queued
          - running
        description: |-
          Current execution state of this pipeline run.

          * `queued` - Queued
          * `running` - Running
          * `completed` - Completed
          * `failed` - Failed
          * `cancelled` - Cancelled
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
