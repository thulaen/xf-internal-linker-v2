    OrphanAudit:
      type: object
      description: Extends the content list serializer with inbound link count for
        the audit table.
      properties:
        id:
          type: integer
          readOnly: true
        content_id:
          type: integer
          readOnly: true
          description: The original ID in XenForo or WordPress (not the local DB primary
            key).
        content_type:
          allOf:
          - $ref: '#/components/schemas/ContentTypeEnum'
          readOnly: true
          description: |-
            Whether this is a forum thread, resource, or WordPress content item.

            * `thread` - Forum Thread
            * `resource` - Resource
            * `wp_post` - WordPress Post
            * `wp_page` - WordPress Page
            * `crawled_page` - Crawled Page
        content_type_label:
          type: string
          readOnly: true
        source_label:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
          description: The title of the thread or resource.
        url:
          type: string
          format: uri
          readOnly: true
          description: Canonical URL of this content on the live forum.
        scope:
          type: integer
          readOnly: true
          nullable: true
          description: The forum node or category this content belongs to.
        scope_title:
          type: string
          readOnly: true
          default: ''
        march_2026_pagerank_score:
          type: number
          format: double
          readOnly: true
          title: March 2026 PageRank
          description: March 2026 PageRank score based on edge prominence and context.
            Recalculated after each sync.
        velocity_score:
          type: number
          format: double
          readOnly: true
          description: Recency/engagement velocity score. Higher = trending recently.
        link_freshness_score:
          type: number
          format: double
          readOnly: true
          description: Link Freshness score based only on inbound link-history timing.
            0.5 = neutral.
        content_value_score:
          type: number
          format: double
          readOnly: true
          description: GA4 + Matomo + GSC composite score for linking value. 0.5 =
            neutral (no activity in the lookback window). Written by analytics.sync._refresh_content_value_scores
            via the pure formula compute_content_value_raw. Phase 3a/3c extension
            credits the dwell gradient (half-weight dwell-30s + full-weight dwell-60s)
            and penalises quick-exit rate per Kim et al. WSDM 2014 — all three terms
            are zero when Phase 2 telemetry is unavailable, so pre-Phase 3a sites
            see no behaviour change.
        freshness_bucket:
          type: string
          readOnly: true
        view_count:
          type: integer
          readOnly: true
          description: Number of views on the live forum.
        reply_count:
          type: integer
          readOnly: true
          description: Number of replies (threads) or reviews (resources).
        post_date:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the thread/resource was originally posted.
        is_deleted:
          type: boolean
          readOnly: true
          description: True if this content was deleted on the live forum (suggestions
            become stale).
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last modified.
        inbound_link_count:
          type: integer
          readOnly: true
      required:
      - content_id
      - content_type
      - content_type_label
      - content_value_score
      - created_at
      - freshness_bucket
      - id
      - inbound_link_count
      - is_deleted
      - link_freshness_score
      - march_2026_pagerank_score
      - post_date
      - reply_count
      - scope
      - scope_title
      - source_label
      - title
      - updated_at
      - url
      - velocity_score
      - view_count
