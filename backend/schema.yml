components:
  schemas:
    ActionEnum:
      enum:
      - approve
      - reject
      - apply
      - verify
      - edit_anchor
      - mark_stale
      - supersede
      - note
      - setting_change
      - plugin_toggle
      - pipeline_start
      - pipeline_complete
      - sync_start
      - sync_complete
      type: string
      description: |-
        * `approve` - Approved suggestion
        * `reject` - Rejected suggestion
        * `apply` - Marked as applied
        * `verify` - Verified live link
        * `edit_anchor` - Edited anchor text
        * `mark_stale` - Marked as stale
        * `supersede` - Superseded
        * `note` - Note added
        * `setting_change` - Setting changed
        * `plugin_toggle` - Plugin enabled/disabled
        * `pipeline_start` - Pipeline run started
        * `pipeline_complete` - Pipeline run completed
        * `sync_start` - Sync started
        * `sync_complete` - Sync completed
    AnchorConfidenceEnum:
      enum:
      - strong
      - weak
      - none
      type: string
      description: |-
        * `strong` - Strong (exact phrase match)
        * `weak` - Weak (partial / fallback)
        * `none` - None (no anchor found)
    AuditEntry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
          description: |-
            What type of action was taken.

            * `approve` - Approved suggestion
            * `reject` - Rejected suggestion
            * `apply` - Marked as applied
            * `verify` - Verified live link
            * `edit_anchor` - Edited anchor text
            * `mark_stale` - Marked as stale
            * `supersede` - Superseded
            * `note` - Note added
            * `setting_change` - Setting changed
            * `plugin_toggle` - Plugin enabled/disabled
            * `pipeline_start` - Pipeline run started
            * `pipeline_complete` - Pipeline run completed
            * `sync_start` - Sync started
            * `sync_complete` - Sync completed
        target_type:
          type: string
          readOnly: true
          description: The model/entity type affected, e.g. 'suggestion', 'setting',
            'plugin'.
        target_id:
          type: string
          readOnly: true
          description: The primary key of the affected record.
        detail:
          readOnly: true
          description: 'Extra context: previous value, new value, reason, etc.'
        ip_address:
          type: string
          readOnly: true
          nullable: true
          description: IP address of the user who took this action.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When this action was recorded.
      required:
      - action
      - created_at
      - detail
      - id
      - ip_address
      - target_id
      - target_type
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    BlankEnum:
      enum:
      - ''
    BrokenLink:
      type: object
      description: Serialize broken-link scan records for the Link Health UI.
      properties:
        broken_link_id:
          type: string
          format: uuid
          readOnly: true
          description: Stable UUID used by the API and Angular frontend.
        source_content:
          type: integer
          readOnly: true
          description: The content item where this URL was found.
        source_content_title:
          type: string
          readOnly: true
        source_content_url:
          type: string
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
          description: The URL found in the source content.
        http_status:
          type: integer
          readOnly: true
          description: Last HTTP status code seen for this URL. 0 means connection
            error or timeout.
        redirect_url:
          type: string
          format: uri
          readOnly: true
          description: Redirect destination when the URL responds with a redirect
            status.
        first_detected_at:
          type: string
          format: date-time
          readOnly: true
          description: When this issue was first detected by the scanner.
        last_checked_at:
          type: string
          format: date-time
          readOnly: true
          description: When the scanner last checked this URL.
        status:
          allOf:
          - $ref: '#/components/schemas/BrokenLinkStatusEnum'
          description: |-
            Manual review state for this broken-link record.

            * `open` - Open
            * `ignored` - Ignored
            * `fixed` - Fixed
        notes:
          type: string
          description: Reviewer notes about why the record was ignored or fixed.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last modified.
      required:
      - broken_link_id
      - created_at
      - first_detected_at
      - http_status
      - last_checked_at
      - redirect_url
      - source_content
      - source_content_title
      - source_content_url
      - updated_at
      - url
    BrokenLinkStatusEnum:
      enum:
      - open
      - ignored
      - fixed
      type: string
      description: |-
        * `open` - Open
        * `ignored` - Ignored
        * `fixed` - Fixed
    CandidateOriginEnum:
      enum:
      - embedding
      - graph_walk
      - both
      - behavioral_hub
      type: string
      description: |-
        * `embedding` - Embedding Similarity
        * `graph_walk` - Pixie Graph Walk
        * `both` - Both Channel Match
        * `behavioral_hub` - Behavioral Hub
    ConflictTypeEnum:
      enum:
      - duplication
      - mismatch
      - placeholder
      - drift
      type: string
      description: |-
        * `duplication` - Duplication / Stub Paths
        * `mismatch` - Spec / Code Mismatch
        * `placeholder` - Placeholder UI / API
        * `drift` - Repo Drift
    ContentItemDetail:
      type: object
      description: Full serializer for detail views; includes distilled_text and embedding
        status.
      properties:
        id:
          type: integer
          readOnly: true
        content_id:
          type: integer
          readOnly: true
          description: The original ID in XenForo or WordPress (not the local DB primary
            key).
        content_type:
          allOf:
          - $ref: '#/components/schemas/ContentTypeEnum'
          readOnly: true
          description: |-
            Whether this is a forum thread, resource, or WordPress content item.

            * `thread` - Forum Thread
            * `resource` - Resource
            * `wp_post` - WordPress Post
            * `wp_page` - WordPress Page
            * `crawled_page` - Crawled Page
        content_type_label:
          type: string
          readOnly: true
        source_label:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
          description: The title of the thread or resource.
        url:
          type: string
          format: uri
          readOnly: true
          description: Canonical URL of this content on the live forum.
        scope:
          type: integer
          readOnly: true
          nullable: true
          description: The forum node or category this content belongs to.
        scope_title:
          type: string
          readOnly: true
          default: ''
        distilled_text:
          type: string
          readOnly: true
          description: 'Compact topical summary: title + most information-dense sentences.
            Used for embedding.'
        distill_method:
          allOf:
          - $ref: '#/components/schemas/DistillMethodEnum'
          readOnly: true
          description: |-
            How the distilled_text was generated.

            * `title_plus_body` - Title + Body
            * `title_only` - Title Only
        content_hash:
          type: string
          readOnly: true
          description: SHA-256 hash of the raw post body, used to detect edits.
        march_2026_pagerank_score:
          type: number
          format: double
          readOnly: true
          title: March 2026 PageRank
          description: March 2026 PageRank score based on edge prominence and context.
            Recalculated after each sync.
        velocity_score:
          type: number
          format: double
          readOnly: true
          description: Recency/engagement velocity score. Higher = trending recently.
        link_freshness_score:
          type: number
          format: double
          readOnly: true
          description: Link Freshness score based only on inbound link-history timing.
            0.5 = neutral.
        content_value_score:
          type: number
          format: double
          readOnly: true
          description: Neutral future-facing GA4/GSC composite placeholder score.
            0.5 = neutral. Written by external analytics layer.
        freshness_bucket:
          type: string
          readOnly: true
        view_count:
          type: integer
          readOnly: true
          description: Number of views on the live forum.
        reply_count:
          type: integer
          readOnly: true
          description: Number of replies (threads) or reviews (resources).
        download_count:
          type: integer
          readOnly: true
          description: Download count for resources (0 for threads).
        post_date:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the thread/resource was originally posted.
        last_post_date:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the most recent reply was posted.
        xf_post_id:
          type: integer
          readOnly: true
          nullable: true
          description: XenForo post ID of the first post (for edit detection).
        xf_update_id:
          type: integer
          readOnly: true
          nullable: true
          description: XenForo update/version ID (used to detect edits without re-fetching
            body).
        is_deleted:
          type: boolean
          readOnly: true
          description: True if this content was deleted on the live forum (suggestions
            become stale).
        fetched_at:
          type: string
          format: date-time
          readOnly: true
          description: Last time this record was synced from the XenForo API.
        has_embedding:
          type: boolean
          readOnly: true
        has_post:
          type: boolean
          readOnly: true
        sentence_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last modified.
      required:
      - content_hash
      - content_id
      - content_type
      - content_type_label
      - content_value_score
      - created_at
      - distill_method
      - distilled_text
      - download_count
      - fetched_at
      - freshness_bucket
      - has_embedding
      - has_post
      - id
      - is_deleted
      - last_post_date
      - link_freshness_score
      - march_2026_pagerank_score
      - post_date
      - reply_count
      - scope
      - scope_title
      - sentence_count
      - source_label
      - title
      - updated_at
      - url
      - velocity_score
      - view_count
      - xf_post_id
      - xf_update_id
