      description: |-
        Override list to log suggestion presentations for exposure tracking.

        Each suggestion returned in the list response is recorded as
        "presented" to the requesting user. Deduplicated per user per day
        via a unique constraint on SuggestionPresentation.
      parameters:
      - in: query
        name: anchor_confidence
        schema:
          type: string
          enum:
          - none
          - strong
          - weak
        description: |-
          Confidence of the anchor extraction.

          * `strong` - Strong (exact phrase match)
          * `weak` - Weak (partial / fallback)
          * `none` - None (no anchor found)
      - in: query
        name: is_applied
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: repeated_anchor
        schema:
          type: boolean
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - applied
          - approved
          - pending
          - rejected
          - stale
          - superseded
          - verified
        description: |-
          Current review/lifecycle status of this suggestion.

          * `pending` - Pending Review
          * `approved` - Approved
          * `rejected` - Rejected
          * `applied` - Applied
          * `verified` - Verified
          * `stale` - Stale
          * `superseded` - Superseded
