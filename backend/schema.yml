          type: number
          format: double
          readOnly: true
          description: Stores the destination content-value score at suggestion-scoring
            time. 0.5 = neutral.
        score_phrase_relevance:
          type: number
          format: double
          readOnly: true
          description: FR-008 phrase relevance score for this destination/host sentence
            pair. 0.5 means neutral.
        score_learned_anchor_corroboration:
          type: number
          format: double
          readOnly: true
          description: FR-009 learned-anchor corroboration score for this destination/host
            sentence pair. 0.5 means neutral.
        score_rare_term_propagation:
          type: number
          format: double
          readOnly: true
          description: FR-010 rare-term propagation score for this destination/host
            sentence pair. 0.5 means neutral.
        score_field_aware_relevance:
          type: number
          format: double
          readOnly: true
          description: FR-011 field-aware relevance score for this destination/host
            sentence pair. 0.5 means neutral.
