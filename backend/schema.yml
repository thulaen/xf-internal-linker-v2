    SuggestionDetail:
      type: object
      description: Full serializer for the suggestion review detail view.
      properties:
        suggestion_id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier for this suggestion.
        pipeline_run:
          type: string
          format: uuid
          description: The pipeline run that generated this suggestion.
          readOnly: true
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/Status6f0Enum'
          description: |-
            Current review/lifecycle status of this suggestion.

            * `pending` - Pending Review
            * `approved` - Approved
            * `rejected` - Rejected
            * `applied` - Applied
            * `verified` - Verified
            * `stale` - Stale
            * `superseded` - Superseded
        score_final:
          type: number
          format: double
          readOnly: true
          description: Weighted composite of all score components. Used to rank suggestions.
        score_semantic:
          type: number
          format: double
          readOnly: true
          description: Cosine similarity between destination embedding and host sentence
            embedding.
        score_keyword:
          type: number
          format: double
          readOnly: true
          description: Keyword overlap score between destination distilled text and
            host sentence.
        score_node_affinity:
          type: number
          format: double
          readOnly: true
          description: Bonus when destination and host are in related forum nodes.
        score_quality:
          type: number
          format: double
          readOnly: true
          description: Quality score based on host thread engagement metrics.
        score_march_2026_pagerank:
          type: number
          format: double
          readOnly: true
          title: March 2026 PageRank
          description: March 2026 PageRank of the destination (higher = more editorially
            prominent).
        score_velocity:
          type: number
          format: double
          readOnly: true
          description: Velocity/recency bonus for trending destinations.
        score_link_freshness:
          type: number
          format: double
          readOnly: true
          description: Link Freshness score of the destination. 0.5 means neutral
            or not enough history.
        score_ga4_gsc:
          type: number
          format: double
          readOnly: true
          description: Stores the destination content-value score at suggestion-scoring
            time. 0.5 = neutral.
        score_phrase_relevance:
          type: number
          format: double
          readOnly: true
          description: FR-008 phrase relevance score for this destination/host sentence
            pair. 0.5 means neutral.
        score_learned_anchor_corroboration:
          type: number
          format: double
          readOnly: true
          description: FR-009 learned-anchor corroboration score for this destination/host
            sentence pair. 0.5 means neutral.
        score_rare_term_propagation:
          type: number
          format: double
          readOnly: true
          description: FR-010 rare-term propagation score for this destination/host
            sentence pair. 0.5 means neutral.
        score_field_aware_relevance:
          type: number
          format: double
          readOnly: true
          description: FR-011 field-aware relevance score for this destination/host
            sentence pair. 0.5 means neutral.
        score_click_distance:
          type: number
          format: double
          readOnly: true
          description: FR-012 click-distance structural prior score. 1.0 = shallowest.
            0.5 = neutral.
        score_explore_exploit:
          type: number
          format: double
          readOnly: true
          description: FR-013 feedback-driven explore/exploit reranking score. 0.5
            = neutral.
        score_cluster_suppression:
          type: number
          format: double
          readOnly: true
          description: FR-014 near-duplicate clustering suppression score. Negative
            values indicate suppression.
        score_slate_diversity:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: FR-015 MMR diversity score for this suggestion's slot in the
            host slate. Null when diversity reranking is disabled.
        destination:
          type: integer
          readOnly: true
          description: The content item that will receive an incoming link.
        destination_title:
          type: string
          readOnly: true
          description: Denormalized destination title for fast display without JOINs.
        destination_url:
          type: string
          readOnly: true
          default: ''
        destination_content_type:
          type: string
          readOnly: true
          default: ''
        destination_source_label:
          type: string
          readOnly: true
        destination_silo_group:
          type: integer
          readOnly: true
          nullable: true
        destination_silo_group_name:
          type: string
          readOnly: true
          default: ''
        host:
          type: integer
          readOnly: true
          description: The content item whose post will contain the new link.
        host_title:
          type: string
          readOnly: true
          default: ''
        host_sentence:
          type: integer
          readOnly: true
          description: The specific sentence where the link will be inserted.
        host_sentence_text:
          type: string
          readOnly: true
          description: Denormalized sentence text for fast display without JOINs.
        host_content_type:
          type: string
          readOnly: true
          default: ''
        host_source_label:
          type: string
          readOnly: true
        host_silo_group:
          type: integer
          readOnly: true
          nullable: true
        host_silo_group_name:
          type: string
          readOnly: true
          default: ''
        same_silo:
          type: boolean
          readOnly: true
        anchor_phrase:
          type: string
          readOnly: true
          description: The phrase in the host sentence that becomes the clickable
            link text.
        anchor_start:
          type: integer
          readOnly: true
          nullable: true
          description: Character offset of anchor_phrase within host_sentence_text.
        anchor_end:
          type: integer
          readOnly: true
          nullable: true
          description: Character end offset of anchor_phrase within host_sentence_text.
        anchor_confidence:
          allOf:
          - $ref: '#/components/schemas/AnchorConfidenceEnum'
          readOnly: true
          description: |-
            Confidence of the anchor extraction.

            * `strong` - Strong (exact phrase match)
            * `weak` - Weak (partial / fallback)
            * `none` - None (no anchor found)
        anchor_edited:
          type: string
          description: Reviewer-edited anchor (overrides anchor_phrase when set).
          maxLength: 500
        repeated_anchor:
          type: boolean
          readOnly: true
          description: True if this anchor is already used in another active suggestion
            for this destination.
        rejection_reason:
          description: |-
            Why this suggestion was rejected.

            * `` - — No reason —
            * `irrelevant` - Irrelevant / off-topic
            * `low_quality` - Low quality match
            * `already_linked` - Already linked
            * `bad_anchor` - Bad anchor text
            * `wrong_context` - Wrong context
            * `duplicate` - Duplicate suggestion
            * `other` - Other
          oneOf:
          - $ref: '#/components/schemas/RejectionReasonEnum'
          - $ref: '#/components/schemas/BlankEnum'
        reviewer_notes:
          type: string
          description: Free-text notes from the reviewer.
        reviewed_at:
          type: string
          format: date-time
          nullable: true
          description: When a reviewer approved or rejected this suggestion.
        is_applied:
          type: boolean
          description: True when the reviewer has manually applied this link on the
            live forum.
        applied_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the suggestion was marked as applied.
        verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the link was automatically verified as live via XenForo
            API.
        stale_reason:
          type: string
          readOnly: true
          description: Why this suggestion became stale (e.g. 'host post edited').
        superseded_by:
          type: string
          format: uuid
          description: Points to the newer suggestion that replaced this one.
          readOnly: true
          nullable: true
        superseded_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When this suggestion was superseded.
        phrase_match_diagnostics:
          readOnly: true
          description: Explainable FR-008 phrase-match details for review and debugging.
        learned_anchor_diagnostics:
          readOnly: true
          description: Explainable FR-009 learned-anchor diagnostics for review and
            debugging.
        rare_term_diagnostics:
          readOnly: true
          description: Explainable FR-010 rare-term propagation diagnostics for review
            and debugging.
        field_aware_diagnostics:
          readOnly: true
          description: Explainable FR-011 field-aware relevance diagnostics for review
            and debugging.
        click_distance_diagnostics:
          readOnly: true
          description: Explainable FR-012 click-distance context for review and debugging.
        explore_exploit_diagnostics:
          readOnly: true
          description: Explainable FR-013 explore/exploit details for review and debugging.
        cluster_diagnostics:
          readOnly: true
          description: Explainable FR-014 near-duplicate clustering details for review
            and debugging.
        slate_diversity_diagnostics:
          readOnly: true
          description: Explainable FR-015 MMR slot selection details for review and
