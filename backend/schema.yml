    PipelineDiagnostic:
      type: object
      description: Serializes pipeline skip diagnostics for the why-no-suggestion
        explorer.
      properties:
        id:
          type: integer
          readOnly: true
        pipeline_run:
          type: string
          format: uuid
          description: The pipeline run this diagnostic belongs to.
          readOnly: true
        destination:
          type: integer
          readOnly: true
          description: The destination content item that was skipped.
        destination_title:
          type: string
          readOnly: true
        skip_reason:
          allOf:
          - $ref: '#/components/schemas/SkipReasonEnum'
          readOnly: true
          description: |-
            Short code describing why no suggestion was created.

            * `already_has_pending` - Already has a pending suggestion
            * `no_semantic_matches` - No semantic matches found
            * `all_candidates_filtered` - All candidates filtered out
            * `no_host_sentences` - No eligible host sentences found
            * `score_too_low` - Best match score below threshold
            * `no_embedding` - Destination has no embedding
            * `max_links_reached` - Host already has max links
            * `anchor_banned` - All candidate anchors are banned
            * `anchor_too_long` - Anchor text exceeds maximum word count
            * `short_post` - Post too short to distill
            * `host_reuse_cap` - Host reuse cap reached
            * `circular_suppressed` - Circular candidate suppressed
            * `cross_silo_blocked` - Cross-silo candidate blocked by strict mode
            * `paragraph_cluster` - Host paragraph already has a suggestion
            * `other` - Other
        detail:
          readOnly: true
          description: Extra diagnostic data (e.g. best score found, threshold used).
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When this diagnostic record was created.
      required:
      - created_at
      - destination
      - destination_title
      - detail
      - id
      - pipeline_run
      - skip_reason
    PipelineRun:
      type: object
      description: Serializes pipeline run metadata for the jobs dashboard.
      properties:
        run_id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier for this pipeline run.
        rerun_mode:
          allOf:
          - $ref: '#/components/schemas/RerunModeEnum'
          description: |-
            Controls how this run handles destinations that already have suggestions.

            * `skip_pending` - Skip Pending — don't replace existing pending suggestions
            * `supersede_pending` - Supersede Pending — replace with new suggestions
            * `full_regenerate` - Full Regenerate — replace all, including approved
        run_state:
          allOf:
          - $ref: '#/components/schemas/RunStateEnum'
          readOnly: true
          description: |-
            Current execution state of this pipeline run.

            * `queued` - Queued
            * `running` - Running
            * `completed` - Completed
            * `failed` - Failed
            * `cancelled` - Cancelled
        suggestions_created:
          type: integer
          readOnly: true
          description: Number of new suggestions generated in this run.
        destinations_processed:
          type: integer
          readOnly: true
          description: Number of destination items fully processed.
        destinations_skipped:
          type: integer
          readOnly: true
          description: Number of destination items skipped (no good match found).
        duration_seconds:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: Total wall-clock seconds the run took to complete.
        duration_display:
          type: string
          nullable: true
          readOnly: true
        error_message:
          type: string
          readOnly: true
          description: Error details if run_state is 'failed'.
        celery_task_id:
          type: string
          readOnly: true
          description: Celery task ID — used by the frontend to subscribe to WebSocket
            progress.
        host_scope:
          description: Scope config for host content (which threads can have links
            inserted).
        destination_scope:
          description: Scope config for destination content (which threads are linked
            to).
        config_snapshot:
          readOnly: true
          description: Frozen ML weights and settings at the time this run started.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last modified.
      required:
      - celery_task_id
      - config_snapshot
      - created_at
      - destinations_processed
      - destinations_skipped
      - duration_display
      - duration_seconds
      - error_message
      - run_id
      - run_state
      - suggestions_created
      - updated_at
