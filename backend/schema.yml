            schema:
              $ref: '#/components/schemas/WeightPreset'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WeightPreset'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightPreset'
          description: ''
  /api/weight-presets/current/:
    get:
      operationId: weight_presets_current_retrieve
      description: Return the current in-scope AppSetting values as a weights dict.
      tags:
      - weight-presets
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
