openapi: 3.0.3
info:
  title: XF Internal Linker API
  version: 1.0.0
  description: REST API for the XenForo internal linking tool.
paths:
  /api/analytics/impacts/:
    get:
      operationId: analytics_impacts_retrieve
      description: GET /api/analytics/impacts/ — chronological impact narrative.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/oauth/authorize/:
    get:
      operationId: analytics_oauth_authorize_retrieve
      description: |-
        Generate the Google OAuth authorization URL.
        Requires analytics.google_oauth_client_id and analytics.google_oauth_client_secret to be set.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/oauth/callback/:
    get:
      operationId: analytics_oauth_callback_retrieve
      description: |-
        Handle the callback from Google OAuth.
        Exchange the code for a refresh token and save it.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/oauth/unlink/:
    post:
      operationId: analytics_oauth_unlink_create
      description: Remove the saved Google OAuth refresh token.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/query-mismatch/:
    get:
      operationId: analytics_query_mismatch_retrieve
      description: GET /api/analytics/query-mismatch/ — pages where search intent
        doesn't match landing page.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/search-impact/:
    get:
      operationId: analytics_search_impact_retrieve
      description: List applied suggestions with GSC impact results.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/search-impact/{suggestion_id}/:
    get:
      operationId: analytics_search_impact_retrieve_2
      description: Detailed keyword lift for one suggestion.
      parameters:
      - in: path
        name: suggestion_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/:
    get:
      operationId: analytics_settings_ga4_retrieve
      description: Get and save GA4 telemetry settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: analytics_settings_ga4_update
      description: Get and save GA4 telemetry settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/test-connection/:
    post:
      operationId: analytics_settings_ga4_test_connection_create
      description: Run a lightweight GA4 Measurement Protocol test.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/test-read-connection/:
    post:
      operationId: analytics_settings_ga4_test_read_connection_create
      description: Run a lightweight GA4 Data API read test.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/google-oauth/:
    get:
      operationId: analytics_settings_google_oauth_retrieve
      description: Get and save the shared Google OAuth app credentials.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: analytics_settings_google_oauth_update
      description: Get and save the shared Google OAuth app credentials.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/gsc/:
    get:
      operationId: analytics_settings_gsc_retrieve
      description: Get and save GSC settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: analytics_settings_gsc_update
      description: Get and save GSC settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/gsc/test-connection/:
    post:
      operationId: analytics_settings_gsc_test_connection_create
      description: Test GSC service account access.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/matomo/:
    get:
      operationId: analytics_settings_matomo_retrieve
      description: Get and save Matomo telemetry settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: analytics_settings_matomo_update
      description: Get and save Matomo telemetry settings.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/matomo/test-connection/:
    post:
      operationId: analytics_settings_matomo_test_connection_create
      description: Run a lightweight Matomo API test.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/breakdowns/:
    get:
      operationId: analytics_telemetry_breakdowns_retrieve
      description: Return simple device and channel breakdowns for the selected telemetry
        window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/by-version/:
    get:
      operationId: analytics_telemetry_by_version_retrieve
      description: Compare performance metrics group by algorithm version.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/engagement-mix/:
    get:
      operationId: analytics_telemetry_engagement_mix_retrieve
      description: |-
        Return the Phase 2 engagement mix for the selected source + time window.

        Surfaces the three new ``SuggestionTelemetryDaily`` columns
        (``quick_exit_sessions``, ``dwell_30s_sessions``, ``dwell_60s_sessions``)
        alongside the existing ``destination_views`` and ``engaged_sessions`` so
        operators can see the dwell-tier distribution per source.

        Rates are computed as ``<tier_count> / destination_views`` via the
        existing ``_safe_rate`` helper (returns 0.0 on zero denominators). Tiers
        are cumulative (a session that reaches 60s also fires the 30s event), so
        the rates are independent tier-reach percentages, not stacked shares.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/funnel/:
    get:
      operationId: analytics_telemetry_funnel_retrieve
      description: Return the simple FR-016 funnel for the selected source and time
        window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/ga4-sync/:
    post:
      operationId: analytics_telemetry_ga4_sync_create
      description: Queue a GA4 telemetry sync run.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/geo-detail/:
    get:
      operationId: analytics_telemetry_geo_detail_retrieve
      description: Return a detailed country+region breakdown for the selected telemetry
        window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/gsc-sync/:
    post:
      operationId: analytics_telemetry_gsc_sync_create
      description: Queue a GSC performance sync run.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/health/:
    get:
      operationId: analytics_telemetry_health_retrieve
      description: Return simple telemetry-health rollups for the selected time window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/integration/:
    get:
      operationId: analytics_telemetry_integration_retrieve
      description: Return copy-ready browser bridge instructions for FR-016 Slice
        2.
      tags:
