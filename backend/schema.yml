      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    BlankEnum:
      enum:
      - ''
    BrokenLink:
      type: object
      description: Serialize broken-link scan records for the Link Health UI.
      properties:
        broken_link_id:
          type: string
          format: uuid
          readOnly: true
          description: Stable UUID used by the API and Angular frontend.
        source_content:
          type: integer
          readOnly: true
          description: The content item where this URL was found.
        source_content_title:
          type: string
          readOnly: true
        source_content_url:
          type: string
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
          description: The URL found in the source content.
        http_status:
          type: integer
          readOnly: true
          description: Last HTTP status code seen for this URL. 0 means connection
