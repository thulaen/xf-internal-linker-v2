    ErrorLog:
      type: object
      description: |-
        Phase GT Step 6. Adds two derived fields to every ErrorLog row:

        - `error_trend` — 7-day bucket counts per fingerprint so the UI can
          render a sparkline showing whether this error is trending up or dying.
        - `related_error_ids` — up to 10 ids of other errors that fired within
          ±5 minutes so the operator doesn't waste time fixing 10 symptoms
          of one root cause.

        The derived fields are computed per row, so keep them cheap: indexed
        lookups only, no `.all()` scans.
      properties:
        id:
          type: integer
          readOnly: true
        error_trend:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        related_error_ids:
          type: array
          items:
            type: integer
          readOnly: true
        job_type:
          type: string
          description: Type of job that failed, e.g. 'import', 'embed', 'pipeline',
            'sync'.
          maxLength: 50
        step:
          type: string
          description: The specific step or function where the error occurred.
          maxLength: 100
        error_message:
          type: string
          description: Human-readable error message.
        raw_exception:
          type: string
          description: Full Python traceback (for debugging).
        why:
          type: string
          description: Plain-English explanation of what likely caused this error.
        acknowledged:
          type: boolean
          description: True once the user has reviewed and dismissed this error.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When this error was recorded.
        source:
          allOf:
          - $ref: '#/components/schemas/ErrorLogSourceEnum'
          description: |-
            Origin of this entry: internal (Celery tasks) or glitchtip (sync task).

            * `internal` - Internal
            * `glitchtip` - GlitchTip
        glitchtip_issue_id:
          type: string
          nullable: true
          description: Issue id from GlitchTip when source='glitchtip'.
          maxLength: 100
        glitchtip_url:
          type: string
          format: uri
          nullable: true
          description: Deep link to the GlitchTip issue detail page.
          maxLength: 200
        fingerprint:
          type: string
          nullable: true
          description: 'Normalised hash used to dedupe repeat occurrences. Internal:
            sha1(job|step|normalize(message)). GlitchTip: their fingerprint.'
          maxLength: 255
        occurrence_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Number of times this fingerprint has been seen on this node.
        severity:
          $ref: '#/components/schemas/SeverityD90Enum'
        how_to_fix:
          type: string
          description: Plain-English fix suggestion surfaced to the operator.
        node_id:
          type: string
          default: primary
          description: Identifier of the node that produced this error.
          maxLength: 100
        node_role:
          $ref: '#/components/schemas/NodeRoleEnum'
        node_hostname:
          type: string
          maxLength: 255
        runtime_context:
          description: Snapshot produced by apps.audit.runtime_context.snapshot()
            — GPU/CUDA/embedding/spaCy/python/node at the moment of failure.
      required:
      - created_at
      - error_message
      - error_trend
      - fingerprint
      - id
      - job_type
      - related_error_ids
      - step
    ErrorLogSourceEnum:
      enum:
      - internal
      - glitchtip
      type: string
      description: |-
        * `internal` - Internal
        * `glitchtip` - GlitchTip
    FeatureRequest:
      type: object
      description: |-
        Phase GB / Gap 151 — serializer for the in-app feature-request inbox.

        Read path exposes aggregated vote count and the submitter's username.
        Write path restricts the fields an operator can set — ``status``,
        ``votes``, and ``admin_reply`` are maintainer-only and mutated via
        the viewset's dedicated actions.
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
