            Current review/lifecycle status of this suggestion.

            * `pending` - Pending Review
            * `approved` - Approved
            * `rejected` - Rejected
            * `applied` - Applied
            * `verified` - Verified
            * `stale` - Stale
            * `superseded` - Superseded
