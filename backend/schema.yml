    post:
      operationId: weight_presets_apply_create
      description: Apply this preset's weights atomically to AppSetting and record
        history.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Weight Preset.
        required: true
      tags:
      - weight-presets
      requestBody:
        content:
          application/json:
