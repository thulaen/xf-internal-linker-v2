    ScheduledJob:
      type: object
      description: |-
        Summary payload for list + detail endpoints.

        Read-only — state transitions happen through the explicit
        pause/resume/cancel/run-now actions, never a generic PATCH.
      properties:
        id:
          type: integer
          readOnly: true
        key:
          type: string
          readOnly: true
          description: Stable identifier for this job, e.g. 'pagerank_refresh' or
            'lda_topic_refresh'. Code looks the job up by this key.
        display_name:
          type: string
          readOnly: true
          description: Human-readable label shown in the Scheduled Updates tab.
        priority:
          allOf:
          - $ref: '#/components/schemas/PriorityD90Enum'
          readOnly: true
          description: |-
            Runner orders pending jobs by this.

            * `critical` - Critical
            * `high` - High
            * `medium` - Medium
            * `low` - Low
        state:
          allOf:
          - $ref: '#/components/schemas/ScheduledJobStateEnum'
          readOnly: true
        progress_pct:
          type: number
          format: double
          readOnly: true
          description: 0-100. Set by job code via report_progress().
        current_message:
          type: string
          readOnly: true
          description: Short status string the UI shows next to the progress bar.
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        finished_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_run_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the job last *started*, regardless of outcome.
        last_success_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the job last *completed successfully*. Null until first
            success.
        scheduled_for:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the job's next run is planned. The runner uses this plus
            the priority to decide what to start next. Null = on-demand only.
        cadence_seconds:
          type: integer
          readOnly: true
          description: Expected gap between successful runs. The catch-up detector
            flags the job as missed when now - last_success_at exceeds this.
        duration_estimate_sec:
          type: integer
          readOnly: true
        pause_token:
          type: boolean
          readOnly: true
        log_tail:
          type: string
          readOnly: true
          description: Last ~4 KB of output. Truncated in save().
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
