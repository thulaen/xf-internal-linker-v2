openapi: 3.0.3
info:
  title: XF Internal Linker API
  version: 1.0.0
  description: REST API for the XenForo internal linking tool.
paths:
  /api/analytics/oauth/authorize/:
    get:
      operationId: api_analytics_oauth_authorize_retrieve
      description: |-
        Generate the Google OAuth authorization URL.
        Requires analytics.google_oauth_client_id and analytics.google_oauth_client_secret to be set.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/oauth/callback/:
    get:
      operationId: api_analytics_oauth_callback_retrieve
      description: |-
        Handle the callback from Google OAuth.
        Exchange the code for a refresh token and save it.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/oauth/unlink/:
    post:
      operationId: api_analytics_oauth_unlink_create
      description: Remove the saved Google OAuth refresh token.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/search-impact/:
    get:
      operationId: api_analytics_search_impact_retrieve
      description: List applied suggestions with GSC impact results.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/search-impact/{suggestion_id}/:
    get:
      operationId: api_analytics_search_impact_retrieve_2
      description: Detailed keyword lift for one suggestion.
      parameters:
      - in: path
        name: suggestion_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/:
    get:
      operationId: api_analytics_settings_ga4_retrieve
      description: Get and save GA4 telemetry settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_analytics_settings_ga4_update
      description: Get and save GA4 telemetry settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/test-connection/:
    post:
      operationId: api_analytics_settings_ga4_test_connection_create
      description: Run a lightweight GA4 Measurement Protocol test.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/ga4/test-read-connection/:
    post:
      operationId: api_analytics_settings_ga4_test_read_connection_create
      description: Run a lightweight GA4 Data API read test.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/google-oauth/:
    get:
      operationId: api_analytics_settings_google_oauth_retrieve
      description: Get and save the shared Google OAuth app credentials.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_analytics_settings_google_oauth_update
      description: Get and save the shared Google OAuth app credentials.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/gsc/:
    get:
      operationId: api_analytics_settings_gsc_retrieve
      description: Get and save GSC settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_analytics_settings_gsc_update
      description: Get and save GSC settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/gsc/test-connection/:
    post:
      operationId: api_analytics_settings_gsc_test_connection_create
      description: Test GSC service account access.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/matomo/:
    get:
      operationId: api_analytics_settings_matomo_retrieve
      description: Get and save Matomo telemetry settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_analytics_settings_matomo_update
      description: Get and save Matomo telemetry settings.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/settings/matomo/test-connection/:
    post:
      operationId: api_analytics_settings_matomo_test_connection_create
      description: Run a lightweight Matomo API test.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/breakdowns/:
    get:
      operationId: api_analytics_telemetry_breakdowns_retrieve
      description: Return simple device and channel breakdowns for the selected telemetry
        window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/by-version/:
    get:
      operationId: api_analytics_telemetry_by_version_retrieve
      description: Compare performance metrics group by algorithm version.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/funnel/:
    get:
      operationId: api_analytics_telemetry_funnel_retrieve
      description: Return the simple FR-016 funnel for the selected source and time
        window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/ga4-sync/:
    post:
      operationId: api_analytics_telemetry_ga4_sync_create
      description: Queue a GA4 telemetry sync run.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/geo-detail/:
    get:
      operationId: api_analytics_telemetry_geo_detail_retrieve
      description: Return a detailed country+region breakdown for the selected telemetry
        window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/gsc-sync/:
    post:
      operationId: api_analytics_telemetry_gsc_sync_create
      description: Queue a GSC performance sync run.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/health/:
    get:
      operationId: api_analytics_telemetry_health_retrieve
      description: Return simple telemetry-health rollups for the selected time window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/integration/:
    get:
      operationId: api_analytics_telemetry_integration_retrieve
      description: Return copy-ready browser bridge instructions for FR-016 Slice
        2.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/matomo-sync/:
    post:
      operationId: api_analytics_telemetry_matomo_sync_create
      description: Queue a Matomo telemetry sync run.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/overview/:
    get:
      operationId: api_analytics_telemetry_overview_retrieve
      description: Small overview payload for the analytics page.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/top-suggestions/:
    get:
      operationId: api_analytics_telemetry_top_suggestions_retrieve
      description: Return the strongest suggestion rows in the selected telemetry
        window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/trend/:
    get:
      operationId: api_analytics_telemetry_trend_retrieve
      description: Return a day-by-day telemetry trend for the selected source and
        time window.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/audit-entries/:
    get:
      operationId: api_audit_entries_list
      description: |-
        GET /api/audit-entries/          — paginated audit trail
        GET /api/audit-entries/{id}/     — full entry with detail JSON
        GET /api/audit-entries/summary/  — action counts grouped by day
      parameters:
      - in: query
        name: action
        schema:
          type: string
          enum:
          - apply
          - approve
          - edit_anchor
          - mark_stale
          - note
          - pipeline_complete
          - pipeline_start
          - plugin_toggle
          - reject
          - setting_change
          - supersede
          - sync_complete
          - sync_start
          - verify
        description: |-
          What type of action was taken.

          * `approve` - Approved suggestion
          * `reject` - Rejected suggestion
          * `apply` - Marked as applied
          * `verify` - Verified live link
          * `edit_anchor` - Edited anchor text
          * `mark_stale` - Marked as stale
          * `supersede` - Superseded
          * `note` - Note added
          * `setting_change` - Setting changed
          * `plugin_toggle` - Plugin enabled/disabled
          * `pipeline_start` - Pipeline run started
          * `pipeline_complete` - Pipeline run completed
          * `sync_start` - Sync started
          * `sync_complete` - Sync completed
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: target_type
        schema:
          type: string
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditEntryList'
          description: ''
  /api/audit-entries/{id}/:
    get:
      operationId: api_audit_entries_retrieve
      description: |-
        GET /api/audit-entries/          — paginated audit trail
        GET /api/audit-entries/{id}/     — full entry with detail JSON
        GET /api/audit-entries/summary/  — action counts grouped by day
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Audit Entry.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntry'
          description: ''
  /api/audit-entries/summary/:
    get:
      operationId: api_audit_entries_summary_retrieve
      description: Action counts grouped by day (last 30 days by default).
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntry'
          description: ''
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Deletes the user's auth token, invalidating all future requests
        with it.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: api_auth_me_retrieve
      description: |-
        Returns the currently authenticated user's profile.
        Returns 401 when no valid token is provided.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/token/:
    post:
      operationId: api_auth_token_create
      description: Token login endpoint — no session auth so CSRF is never checked.
      tags:
      - api
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/behavioral-hubs/:
    get:
      operationId: api_behavioral_hubs_retrieve
      description: GET /api/behavioral-hubs/ — list all hubs.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/behavioral-hubs/{hub_id}/:
    get:
      operationId: api_behavioral_hubs_retrieve_2
      description: GET/PATCH /api/behavioral-hubs/<hub_id>/
      parameters:
      - in: path
        name: hub_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: api_behavioral_hubs_partial_update
      description: GET/PATCH /api/behavioral-hubs/<hub_id>/
      parameters:
      - in: path
        name: hub_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/behavioral-hubs/{hub_id}/members/:
    post:
      operationId: api_behavioral_hubs_members_create
      description: POST /api/behavioral-hubs/<hub_id>/members/ — manually add a member.
      parameters:
      - in: path
        name: hub_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/behavioral-hubs/{hub_id}/members/{content_item_id}/:
    delete:
      operationId: api_behavioral_hubs_members_destroy
      description: DELETE /api/behavioral-hubs/<hub_id>/members/<content_item_id>/
        — remove a member.
      parameters:
      - in: path
        name: content_item_id
        schema:
          type: integer
        required: true
      - in: path
        name: hub_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/behavioral-hubs/detect/:
    post:
      operationId: api_behavioral_hubs_detect_create
      description: POST /api/behavioral-hubs/detect/ — trigger hub detection on-demand.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/:
    get:
      operationId: api_benchmarks_retrieve
      description: GET /api/benchmarks/ — list all runs.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/{id}/:
    get:
      operationId: api_benchmarks_retrieve_2
      description: GET /api/benchmarks/{id}/ — single run with all results.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this benchmark run.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/{id}/report/:
    get:
      operationId: api_benchmarks_report_retrieve
      description: GET /api/benchmarks/{id}/report/ — AI-readable text report.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this benchmark run.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/latest/:
    get:
      operationId: api_benchmarks_latest_retrieve
      description: GET /api/benchmarks/latest/ — most recent completed run.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/trends/:
    get:
      operationId: api_benchmarks_trends_retrieve
      description: GET /api/benchmarks/trends/ — last 30 days of results (medium size).
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/benchmarks/trigger/:
    post:
      operationId: api_benchmarks_trigger_create
      description: POST /api/benchmarks/trigger/ — start a manual benchmark run.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/broken-links/:
    get:
      operationId: api_broken_links_list
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      parameters:
      - in: query
        name: http_status
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - fixed
          - ignored
          - open
        description: |-
          Manual review state for this broken-link record.

          * `open` - Open
          * `ignored` - Ignored
          * `fixed` - Fixed
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBrokenLinkList'
          description: ''
    post:
      operationId: api_broken_links_create
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrokenLink'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BrokenLink'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BrokenLink'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokenLink'
          description: ''
  /api/broken-links/{broken_link_id}/:
    get:
      operationId: api_broken_links_retrieve
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      parameters:
      - in: path
        name: broken_link_id
        schema:
          type: string
          format: uuid
          description: Stable UUID used by the API and Angular frontend.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokenLink'
          description: ''
    patch:
      operationId: api_broken_links_partial_update
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      parameters:
      - in: path
        name: broken_link_id
        schema:
          type: string
          format: uuid
          description: Stable UUID used by the API and Angular frontend.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBrokenLink'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBrokenLink'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBrokenLink'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokenLink'
          description: ''
  /api/broken-links/export-csv/:
    get:
      operationId: api_broken_links_export_csv_retrieve
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokenLink'
          description: ''
  /api/broken-links/scan/:
    post:
      operationId: api_broken_links_scan_create
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrokenLink'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BrokenLink'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BrokenLink'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokenLink'
          description: ''
  /api/content/:
    get:
      operationId: api_content_list
      description: |-
        List and retrieve content items (threads, resources, WordPress posts).

        GET /api/content/              — paginated list (lightweight)
        GET /api/content/{id}/         — full detail with distilled_text
        GET /api/content/{id}/sentences/ — list sentences for this content item
      parameters:
      - in: query
        name: content_type
        schema:
          type: string
          enum:
          - crawled_page
          - resource
          - thread
