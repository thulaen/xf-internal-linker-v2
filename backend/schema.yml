          type: number
          format: double
          readOnly: true
          description: FR-012 click-distance structural prior score. 1.0 = shallowest.
            0.5 = neutral.
        score_explore_exploit:
          type: number
          format: double
          readOnly: true
          description: FR-013 feedback-driven explore/exploit reranking score. 0.5
