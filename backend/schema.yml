    SuggestionList:
      type: object
      description: Lightweight serializer for paginated suggestion list views.
      properties:
        suggestion_id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier for this suggestion.
        status:
          allOf:
          - $ref: '#/components/schemas/Status6f0Enum'
          readOnly: true
          description: |-
            Current review/lifecycle status of this suggestion.

            * `pending` - Pending Review
            * `approved` - Approved
            * `rejected` - Rejected
            * `applied` - Applied
            * `verified` - Verified
            * `stale` - Stale
            * `superseded` - Superseded
        score_final:
          type: number
          format: double
          readOnly: true
          description: Weighted composite of all score components. Used to rank suggestions.
        destination:
          type: integer
          readOnly: true
          description: The content item that will receive an incoming link.
        destination_title:
          type: string
          readOnly: true
          description: Denormalized destination title for fast display without JOINs.
        destination_url:
          type: string
          readOnly: true
          default: ''
        destination_content_type:
          type: string
          readOnly: true
          default: ''
        destination_source_label:
          type: string
          readOnly: true
        destination_silo_group:
          type: integer
          readOnly: true
          nullable: true
        destination_silo_group_name:
          type: string
          readOnly: true
          default: ''
        host:
          type: integer
          readOnly: true
          description: The content item whose post will contain the new link.
        host_title:
          type: string
          readOnly: true
          default: ''
        host_sentence_text:
          type: string
          readOnly: true
          description: Denormalized sentence text for fast display without JOINs.
        host_content_type:
          type: string
          readOnly: true
          default: ''
        host_source_label:
          type: string
          readOnly: true
        host_silo_group:
          type: integer
          readOnly: true
          nullable: true
        host_silo_group_name:
          type: string
          readOnly: true
          default: ''
        same_silo:
          type: boolean
          readOnly: true
        anchor_phrase:
          type: string
          readOnly: true
          description: The phrase in the host sentence that becomes the clickable
            link text.
        anchor_confidence:
          allOf:
          - $ref: '#/components/schemas/AnchorConfidenceEnum'
          readOnly: true
          description: |-
            Confidence of the anchor extraction.

            * `strong` - Strong (exact phrase match)
            * `weak` - Weak (partial / fallback)
            * `none` - None (no anchor found)
        anchor_edited:
          type: string
          readOnly: true
          description: Reviewer-edited anchor (overrides anchor_phrase when set).
        repeated_anchor:
          type: boolean
          readOnly: true
          description: True if this anchor is already used in another active suggestion
            for this destination.
        candidate_origin:
          allOf:
          - $ref: '#/components/schemas/CandidateOriginEnum'
          readOnly: true
          description: |-
            Which candidate generation channel produced this suggestion.

            * `embedding` - Embedding Similarity
            * `graph_walk` - Pixie Graph Walk
            * `both` - Both Channel Match
            * `behavioral_hub` - Behavioral Hub
        rejection_reason:
          readOnly: true
          description: |-
            Why this suggestion was rejected.

            * `` - — No reason —
            * `irrelevant` - Irrelevant / off-topic
            * `low_quality` - Low quality match
            * `already_linked` - Already linked
            * `bad_anchor` - Bad anchor text
            * `wrong_context` - Wrong context
            * `duplicate` - Duplicate suggestion
            * `other` - Other
          oneOf:
          - $ref: '#/components/schemas/RejectionReasonEnum'
          - $ref: '#/components/schemas/BlankEnum'
        reviewed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When a reviewer approved or rejected this suggestion.
        is_applied:
          type: boolean
          readOnly: true
          description: True when the reviewer has manually applied this link on the
            live forum.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
      required:
      - anchor_confidence
      - anchor_edited
      - anchor_phrase
      - candidate_origin
      - created_at
      - destination
      - destination_content_type
      - destination_silo_group
      - destination_silo_group_name
      - destination_source_label
      - destination_title
      - destination_url
      - host
      - host_content_type
      - host_sentence_text
      - host_silo_group
      - host_silo_group_name
      - host_source_label
      - host_title
      - is_applied
      - rejection_reason
      - repeated_anchor
      - reviewed_at
      - same_silo
      - score_final
      - status
      - suggestion_id
    SuggestionReview:
      type: object
      description: |-
        Partial-update serializer for reviewer actions.

        Accepts only the fields the reviewer can change:
        status, anchor_edited, rejection_reason, reviewer_notes, is_applied.
        All other fields are read-only.
      properties:
        suggestion_id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier for this suggestion.
        status:
          allOf:
          - $ref: '#/components/schemas/Status6f0Enum'
          description: |-
            Current review/lifecycle status of this suggestion.

            * `pending` - Pending Review
            * `approved` - Approved
            * `rejected` - Rejected
            * `applied` - Applied
            * `verified` - Verified
            * `stale` - Stale
            * `superseded` - Superseded
        anchor_edited:
          type: string
          description: Reviewer-edited anchor (overrides anchor_phrase when set).
          maxLength: 500
        rejection_reason:
          description: |-
            Why this suggestion was rejected.

            * `` - — No reason —
            * `irrelevant` - Irrelevant / off-topic
            * `low_quality` - Low quality match
            * `already_linked` - Already linked
            * `bad_anchor` - Bad anchor text
            * `wrong_context` - Wrong context
            * `duplicate` - Duplicate suggestion
            * `other` - Other
          oneOf:
          - $ref: '#/components/schemas/RejectionReasonEnum'
          - $ref: '#/components/schemas/BlankEnum'
        reviewer_notes:
          type: string
          description: Free-text notes from the reviewer.
        is_applied:
          type: boolean
          description: True when the reviewer has manually applied this link on the
            live forum.
      required:
      - suggestion_id
    SyncJob:
      type: object
      properties:
