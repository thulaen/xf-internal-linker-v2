          allOf:
          - $ref: '#/components/schemas/DistillMethodEnum'
          readOnly: true
          description: |-
            How the distilled_text was generated.

            * `title_plus_body` - Title + Body
            * `title_only` - Title Only
        content_hash:
          type: string
          readOnly: true
          description: SHA-256 hash of the raw post body, used to detect edits.
        march_2026_pagerank_score:
          type: number
          format: double
          readOnly: true
          title: March 2026 PageRank
          description: March 2026 PageRank score based on edge prominence and context.
            Recalculated after each sync.
        velocity_score:
          type: number
          format: double
          readOnly: true
          description: Recency/engagement velocity score. Higher = trending recently.
        link_freshness_score:
          type: number
          format: double
          readOnly: true
          description: Link Freshness score based only on inbound link-history timing.
            0.5 = neutral.
        content_value_score:
          type: number
          format: double
          readOnly: true
          description: GA4 + Matomo + GSC composite score for linking value. 0.5 =
            neutral (no activity in the lookback window). Written by analytics.sync._refresh_content_value_scores
            via the pure formula compute_content_value_raw. Phase 3a/3c extension
            credits the dwell gradient (half-weight dwell-30s + full-weight dwell-60s)
            and penalises quick-exit rate per Kim et al. WSDM 2014 — all three terms
            are zero when Phase 2 telemetry is unavailable, so pre-Phase 3a sites
            see no behaviour change.
        freshness_bucket:
          type: string
          readOnly: true
        view_count:
          type: integer
          readOnly: true
          description: Number of views on the live forum.
        reply_count:
          type: integer
          readOnly: true
