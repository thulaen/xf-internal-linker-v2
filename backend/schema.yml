          readOnly: true
          nullable: true
        author_username:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 160
        body:
          type: string
        category:
          type: string
          maxLength: 40
        priority:
          $ref: '#/components/schemas/FeatureRequestPriorityEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/FeatureRequestStatusEnum'
          readOnly: true
        context: {}
        votes:
          type: integer
          readOnly: true
        admin_reply:
          type: string
          readOnly: true
        has_voted:
          type: boolean
          readOnly: true
      required:
