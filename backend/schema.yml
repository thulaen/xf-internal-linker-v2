  /api/diagnostics/:
    get:
      operationId: diagnostics_list
      description: List pipeline skip diagnostics for the 'why no suggestion?' explorer.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: pipeline_run
        schema:
          type: string
          format: uuid
        description: Unique identifier for this pipeline run.
      - in: query
        name: skip_reason
        schema:
          type: string
          enum:
          - all_candidates_filtered
          - already_has_pending
          - anchor_banned
          - anchor_diversity_blocked
          - anchor_too_long
          - circular_suppressed
          - cross_silo_blocked
          - host_reuse_cap
          - max_links_reached
          - no_embedding
          - no_host_sentences
          - no_semantic_matches
          - other
          - paragraph_cluster
          - score_too_low
          - short_post
        description: |-
          Short code describing why no suggestion was created.

          * `already_has_pending` - Already has a pending suggestion
          * `no_semantic_matches` - No semantic matches found
          * `all_candidates_filtered` - All candidates filtered out
          * `no_host_sentences` - No eligible host sentences found
          * `score_too_low` - Best match score below threshold
          * `no_embedding` - Destination has no embedding
          * `max_links_reached` - Host already has max links
          * `anchor_banned` - All candidate anchors are banned
          * `anchor_too_long` - Anchor text exceeds maximum word count
          * `short_post` - Post too short to distill
          * `host_reuse_cap` - Host reuse cap reached
          * `circular_suppressed` - Circular candidate suppressed
          * `cross_silo_blocked` - Cross-silo candidate blocked by strict mode
          * `paragraph_cluster` - Host paragraph already has a suggestion
          * `anchor_diversity_blocked` - Anchor diversity guard blocked the candidate
          * `other` - Other
      tags:
      - diagnostics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelineDiagnosticList'
          description: ''
  /api/diagnostics/{id}/:
    get:
      operationId: diagnostics_retrieve
      description: List pipeline skip diagnostics for the 'why no suggestion?' explorer.
      parameters:
