  /api/broken-links/:
    get:
      operationId: broken_links_list
      description: |-
        Link-health endpoints.

        GET   /api/broken-links/
        PATCH /api/broken-links/{broken_link_id}/
        POST  /api/broken-links/scan/
        GET   /api/broken-links/export-csv/
      parameters:
      - in: query
