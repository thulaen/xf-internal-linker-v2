      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/overview/:
    get:
      operationId: analytics_telemetry_overview_retrieve
      description: Small overview payload for the analytics page.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/top-suggestions/:
    get:
      operationId: analytics_telemetry_top_suggestions_retrieve
      description: Return the strongest suggestion rows in the selected telemetry
        window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/telemetry/trend/:
    get:
      operationId: analytics_telemetry_trend_retrieve
      description: Return a day-by-day telemetry trend for the selected source and
        time window.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/watched-pages/:
    get:
      operationId: analytics_watched_pages_retrieve
      description: GET/POST /api/analytics/watched-pages/ — user's watched pages.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: analytics_watched_pages_create
      description: GET/POST /api/analytics/watched-pages/ — user's watched pages.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/watched-pages/{id}/:
    delete:
      operationId: analytics_watched_pages_destroy
      description: DELETE /api/analytics/watched-pages/<id>/ — remove a watched page.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - analytics
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/audit-entries/:
    get:
      operationId: audit_entries_list
      description: |-
        GET /api/audit-entries/          — paginated audit trail
        GET /api/audit-entries/{id}/     — full entry with detail JSON
        GET /api/audit-entries/summary/  — action counts grouped by day
      parameters:
      - in: query
        name: action
        schema:
          type: string
          enum:
          - apply
          - approve
          - clear_suppression
          - edit_anchor
          - mark_stale
          - note
          - pipeline_complete
          - pipeline_start
          - plugin_toggle
          - reject
          - setting_change
          - supersede
          - sync_complete
          - sync_start
          - verify
        description: |-
          What type of action was taken.

          * `approve` - Approved suggestion
          * `reject` - Rejected suggestion
          * `apply` - Marked as applied
          * `verify` - Verified live link
          * `edit_anchor` - Edited anchor text
          * `mark_stale` - Marked as stale
          * `supersede` - Superseded
          * `note` - Note added
          * `setting_change` - Setting changed
          * `plugin_toggle` - Plugin enabled/disabled
          * `pipeline_start` - Pipeline run started
          * `pipeline_complete` - Pipeline run completed
          * `sync_start` - Sync started
          * `sync_complete` - Sync completed
          * `clear_suppression` - Cleared rejected-pair suppression
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: target_type
        schema:
          type: string
      tags:
      - audit-entries
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditEntryList'
          description: ''
  /api/audit-entries/{id}/:
    get:
      operationId: audit_entries_retrieve
      description: |-
        GET /api/audit-entries/          — paginated audit trail
        GET /api/audit-entries/{id}/     — full entry with detail JSON
        GET /api/audit-entries/summary/  — action counts grouped by day
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Audit Entry.
        required: true
      tags:
      - audit-entries
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntry'
          description: ''
  /api/audit-entries/summary/:
    get:
      operationId: audit_entries_summary_retrieve
      description: Action counts grouped by day (last 30 days by default).
      tags:
      - audit-entries
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntry'
          description: ''
  /api/auth/active-users/:
    get:
      operationId: auth_active_users_retrieve
      description: |-
        GET /api/auth/active-users/ — who has made an authenticated request recently.

        Read by the dashboard's "whos on shift" widget. A user is considered
        active if their last_seen_at is within ``ACTIVE_WINDOW_MIN`` minutes.
        The caller is never omitted from the list — the frontend decides
        whether to hide the widget when the only active user is "me".
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/local-verification-bootstrap/:
    post:
      operationId: auth_local_verification_bootstrap_create
      description: |-
        Mint a localhost-only auth token for browser verification.

        Three independent gates must all pass before a token is issued:
        1. LOCAL_VERIFICATION_BOOTSTRAP_ENABLED must be True (opt-in, default False).
        2. The request must carry the X-XFIL-Verification: playwright header.
        3. The TCP peer IP (REMOTE_ADDR) must be the loopback address — this
           cannot be spoofed via HTTP headers the way the Host header can.

        The endpoint ONLY ever creates or repairs the 'playwright-local' throwaway
        account. It never touches any other user's credentials or returns any other
        user's token, regardless of what accounts exist in the database.
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Deletes the user's auth token, invalidating all future requests
        with it.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: |-
        Returns the currently authenticated user's profile.
        Returns 401 when no valid token is provided.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/passkey/login/begin/:
    post:
      operationId: auth_passkey_login_begin_create
      description: |-
        Step 1 of login. Anonymous — returns PublicKeyCredentialRequestOptions.

        A request-options bundle that does NOT list allowCredentials lets the
        browser show the full account chooser. If you want to scope to a
        specific username, POST {"username": "..."} and we'll pre-populate.

        Also answers HEAD — the frontend uses a HEAD probe as a "is passkey
        configured on this backend?" capability check. Any success or
        auth-required response means yes; a not-found response means the
        route isn't wired.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/passkey/login/finish/:
    post:
      operationId: auth_passkey_login_finish_create
      description: Step 2 of login. Verifies assertion, issues DRF token.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/passkey/register/begin/:
    post:
      operationId: auth_passkey_register_begin_create
      description: Step 1 of registration. Returns PublicKeyCredentialCreationOptions.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/passkey/register/finish/:
    post:
      operationId: auth_passkey_register_finish_create
      description: Step 2 of registration. Verifies the attestation and stores the
        credential.
      tags:
      - auth
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: Token login endpoint — no session auth so CSRF is never checked.
      tags:
      - auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
