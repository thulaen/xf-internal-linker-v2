        resolved:
          type: boolean
      required:
      - conflict_type
      - created_at
      - description
      - id
      - location
      - title
      - updated_at
    SystemConflictSeverityEnum:
      enum:
      - low
      - medium
      - high
      - critical
      type: string
      description: |-
        * `low` - Low
        * `medium` - Medium
        * `high` - High
        * `critical` - Critical
    SystemEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
          readOnly: true
        severity:
          allOf:
          - $ref: '#/components/schemas/SystemEventSeverityEnum'
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/SystemEventSourceEnum'
          readOnly: true
        title:
          type: string
          readOnly: true
          description: One-line plain-English description of what happened.
        detail:
          type: string
          readOnly: true
          description: Optional extra context (item counts, duration, etc.).
        metadata:
          readOnly: true
          description: Structured data for the event (e.g. items_count, duration_ms).
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - detail
      - event_id
      - metadata
      - severity
      - source
      - timestamp
      - title
    SystemEventSeverityEnum:
      enum:
      - info
      - success
      - warning
      - error
      type: string
      description: |-
        * `info` - Info
        * `success` - Success
        * `warning` - Warning
        * `error` - Error
    SystemEventSourceEnum:
      enum:
      - heartbeat
      - sync
      - crawler
      - pipeline
      - health
      - webhook
      - prune
      - model
      - system
      type: string
      description: |-
        * `heartbeat` - Heartbeat
        * `sync` - Sync
        * `crawler` - Crawler
        * `pipeline` - Pipeline
        * `health` - Health Check
        * `webhook` - Webhook
        * `prune` - Auto-Prune
        * `model` - ML Model
        * `system` - System
    ValueTypeEnum:
      enum:
      - str
      - int
      - float
      - bool
      - json
      type: string
      description: |-
        * `str` - Text
        * `int` - Integer
        * `float` - Decimal
        * `bool` - True / False
        * `json` - JSON
    WebhookReceipt:
      type: object
      properties:
        receipt_id:
          type: string
          format: uuid
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/Source88aEnum'
          readOnly: true
        event_type:
          type: string
          readOnly: true
        payload:
          readOnly: true
          description: Raw payload received from the webhook.
        status:
          type: string
          readOnly: true
        error_message:
          type: string
          readOnly: true
        sync_job:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - error_message
      - event_type
      - payload
      - receipt_id
      - source
      - status
      - sync_job
    WeightAdjustmentHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/WeightAdjustmentHistorySourceEnum'
          readOnly: true
          description: |-
            What triggered this weight change.

            * `r_auto` - Monthly R auto-tune
            * `cs_auto_tune` - C# L-BFGS auto-tune (FR-018)
            * `manual` - Manual save
            * `preset_applied` - Preset applied
        preset:
          type: integer
          readOnly: true
          nullable: true
          description: The preset that was applied (only set when source='preset_applied').
        preset_name:
          type: string
          readOnly: true
          nullable: true
        previous_weights:
          readOnly: true
          description: Snapshot of all in-scope weights before the change.
        new_weights:
          readOnly: true
          description: Snapshot of all in-scope weights after the change.
        delta:
          readOnly: true
          description: Only the keys that changed, with {previous, new} sub-keys.
        reason:
          type: string
          readOnly: true
          description: 'Plain-English summary, e.g. ''Preset: Recommended applied
            by admin''.'
        r_run_id:
          type: string
          readOnly: true
          description: Reference to the R analytics run (populated by FR-018 when
            active).
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When this adjustment was recorded.
      required:
      - created_at
      - delta
      - id
      - new_weights
      - preset
      - preset_name
      - previous_weights
      - r_run_id
      - reason
      - source
    WeightAdjustmentHistorySourceEnum:
      enum:
      - r_auto
      - cs_auto_tune
      - manual
      - preset_applied
      type: string
      description: |-
        * `r_auto` - Monthly R auto-tune
        * `cs_auto_tune` - C# L-BFGS auto-tune (FR-018)
        * `manual` - Manual save
        * `preset_applied` - Preset applied
    WeightPreset:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Friendly name for this preset, e.g. 'Recommended' or 'Authority-heavy'.
          maxLength: 200
        is_system:
          type: boolean
          readOnly: true
          description: System presets are read-only and cannot be modified or deleted
            via the API.
        weights:
          description: Flat key/value map of AppSetting keys → values for all settings
            in categories ml, link_freshness, and anchor.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last modified.
      required:
      - created_at
      - id
      - is_system
      - name
      - updated_at
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
