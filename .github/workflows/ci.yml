name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Django backend tests ──────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check Django migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py test --verbosity=2

  # ── 2. Angular build + unit tests ───────────────────────────────
  frontend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:ci

  # ── 3. Python linting (ruff) ─────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/

  # ── 4. C# build + xUnit tests ─────────────────────────────────
  csharp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0"

      - name: Build solution
        working-directory: services/http-worker
        run: dotnet build HttpWorker.sln --configuration Release

      - name: Run tests
        working-directory: services/http-worker
        run: dotnet test HttpWorker.sln --no-build --configuration Release --verbosity normal

  # ── 5. C++ static analysis ─────────────────────────────────────
  cpp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: >
          cppcheck
          --enable=warning,performance,portability
          --std=c++17
          --error-exitcode=1
          --suppress=missingIncludeSystem
          backend/extensions/*.cpp

  # ── 6. Angular linting (ESLint) ─────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx ng lint

  # ── 7. Python type checking (mypy) ──────────────────────────────
  backend-typecheck:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run mypy
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python -m mypy apps/crawler/ --config-file mypy.ini

  # ── 8. Python security scanning (bandit) ──────────────────────
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        working-directory: backend
        run: bandit -r apps/ -c bandit.yml

  # ── 9. Python dependency vulnerability scan ───────────────────
  python-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt

  # ── 10. Frontend dependency vulnerability scan ─────────────────
  frontend-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── 11. Validate docker-compose.yml ────────────────────────────
  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config
