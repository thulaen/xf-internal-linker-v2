name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. Django backend tests ──────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check Django migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py test --verbosity=2

  # ── 2. Angular build + unit tests ───────────────────────────────
  frontend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:ci

  # ── 3. Python linting (ruff) ─────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/


  # ── 5. C++ static analysis ─────────────────────────────────────
  cpp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: >
          cppcheck
          --enable=warning,performance,portability
          --std=c++17
          --error-exitcode=1
          --suppress=missingIncludeSystem
          backend/extensions/*.cpp

  # ── 6. Angular linting (ESLint) ─────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx ng lint

  # ── 7. Python type checking (mypy) ──────────────────────────────
  backend-typecheck:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run mypy
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python -m mypy apps/crawler/ --config-file mypy.ini

  # ── 8. Python security scanning (bandit) ──────────────────────
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        working-directory: backend
        run: bandit -r apps/ -c bandit.yml

  # ── 9. Python dependency vulnerability scan ───────────────────
  python-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt

  # ── 10. Frontend dependency vulnerability scan ─────────────────
  frontend-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── 11. Validate docker-compose.yml ────────────────────────────
  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config

  # ── 12. Semgrep security scan (non-blocking — informational only) ─
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v5
      - name: Run Semgrep (Django + Python rules)
        run: >
          semgrep
          --config=p/django
          --config=p/python
          --config=p/secrets
          --output=semgrep-results.json
          --json
          backend/
          || true
      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  # ── 13. Trivy container vulnerability scan (non-blocking) ─────────
  trivy-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table
          output: trivy-results.txt
      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

  # ── 14. clang-format style check (blocking) ───────────────────────
  # Pin to clang-format-22 (matches the local Windows install at
  # C:\Program Files\LLVM\bin\clang-format.exe, version 22.1.x).
  # Without a version pin, apt-get installs whatever Ubuntu currently
  # ships, and different majors produce different output for the same
  # .clang-format config — so a clean source can fail today even though
  # it passed yesterday. We install from apt.llvm.org because Ubuntu's
  # default repos only ship clang-format-18.
  # If the pinned major version is bumped, also re-run the new
  # clang-format -i over backend/extensions/ locally and commit the diff
  # — the workflow gate validates source against the pinned binary.
  cpp-format:
    name: C++ Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format-22 (from apt.llvm.org)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/llvm.gpg
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22
      - name: Check C++ formatting
        run: |
          find backend/extensions \( -name "*.cpp" -o -name "*.h" \) | \
            grep -v '/build/' | \
            xargs clang-format-22 --dry-run --Werror --style=file

  # ── 15. Playwright E2E tests (non-blocking for now) ───────────────
  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod
      - name: Run Playwright tests (CI-safe tests only)
        working-directory: frontend
        run: npx playwright test tests/ --reporter=html || true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── 16. C++ edge-case unit tests (blocking) ───────────────────────────────
  cpp-edge-tests:
    name: C++ Edge-Case Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libtbb-dev

      - name: Configure CMake
        working-directory: backend/extensions/benchmarks
        run: >
          cmake -B build_ci -S .
          -DCMAKE_BUILD_TYPE=Release
          -DBENCHMARK_ENABLE_TESTING=OFF
          -DBENCHMARK_ENABLE_INSTALL=OFF

      - name: Build edge-case test executables
        working-directory: backend/extensions/benchmarks
        run: cmake --build build_ci --target test_edges_simsearch test_edges_scoring -- -j$(nproc)

      - name: Run edge-case tests
        working-directory: backend/extensions/benchmarks
        run: |
          ./build_ci/test_edges_simsearch
          ./build_ci/test_edges_scoring

  # ── 17. GoogleTest C++ unit tests (blocking) ─────────────────────
  cpp-test:
    name: C++ Unit Tests (GoogleTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libtbb-dev
      - name: Configure
        working-directory: backend/extensions
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        working-directory: backend/extensions
        run: cmake --build build --parallel
      - name: Test
        working-directory: backend/extensions/build
        run: ctest --output-on-failure

  # ── 18. AddressSanitizer (blocking) ──────────────────────────────
  cpp-asan:
    name: C++ AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libtbb-dev
      - name: Configure with ASAN
        working-directory: backend/extensions
        run: |
          cmake -B build_asan \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        working-directory: backend/extensions
        run: cmake --build build_asan --parallel
      - name: Test
        working-directory: backend/extensions/build_asan
        run: ctest --output-on-failure

  # ── 19. ThreadSanitizer (non-blocking — TBB may produce false positives) ─
  cpp-tsan:
    name: C++ ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libtbb-dev
      - name: Configure with TSAN
        working-directory: backend/extensions
        run: |
          cmake -B build_tsan \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"
      - name: Build
        working-directory: backend/extensions
        run: cmake --build build_tsan --parallel
      - name: Test (non-blocking)
        working-directory: backend/extensions/build_tsan
        run: ctest --output-on-failure || true
