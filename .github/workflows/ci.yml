name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Django backend tests ──────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check Django migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python manage.py test --verbosity=2

  # ── 2. Angular build + unit tests ───────────────────────────────
  frontend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:ci

  # ── 3. Python linting (ruff) ─────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/

  # ── 4. C# build + xUnit tests ─────────────────────────────────
  csharp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0"

      - name: Build solution
        working-directory: services/http-worker
        run: dotnet build HttpWorker.sln --configuration Release

      - name: Run tests
        working-directory: services/http-worker
        run: dotnet test HttpWorker.sln --no-build --configuration Release --verbosity normal

  # ── 5. C++ static analysis ─────────────────────────────────────
  cpp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: >
          cppcheck
          --enable=warning,performance,portability
          --std=c++17
          --error-exitcode=1
          --suppress=missingIncludeSystem
          backend/extensions/*.cpp

  # ── 6. Angular linting (ESLint) ─────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx ng lint

  # ── 7. Python type checking (mypy) ──────────────────────────────
  backend-typecheck:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-fake-password
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run mypy
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-fake-secret-key
        run: python -m mypy apps/crawler/ --config-file mypy.ini

  # ── 8. Python security scanning (bandit) ──────────────────────
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        working-directory: backend
        run: bandit -r apps/ -c bandit.yml

  # ── 9. Python dependency vulnerability scan ───────────────────
  python-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt

  # ── 10. Frontend dependency vulnerability scan ─────────────────
  frontend-deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── 11. Validate docker-compose.yml ────────────────────────────
  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config

  # ── 12. Semgrep security scan (non-blocking — informational only) ─
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v5
      - name: Run Semgrep (Django + Python rules)
        run: >
          semgrep
          --config=p/django
          --config=p/python
          --config=p/secrets
          --output=semgrep-results.json
          --json
          backend/
          || true
      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  # ── 13. Trivy container vulnerability scan (non-blocking) ─────────
  trivy-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table
          output: trivy-results.txt
      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

  # ── 14. clang-format style check (blocking) ───────────────────────
  cpp-format:
    name: C++ Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check C++ formatting
        run: |
          find backend/extensions -name "*.cpp" -o -name "*.h" | \
            xargs clang-format --dry-run --Werror --style=file

  # ── 15. Playwright E2E tests (non-blocking for now) ───────────────
  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod
      - name: Run Playwright tests (CI-safe tests only)
        working-directory: frontend
        run: npx playwright test tests/ --reporter=html || true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
