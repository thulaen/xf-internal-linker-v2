worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    # ── Docker internal DNS resolver ────────────────────────────
    # Forces Nginx to re-resolve "backend" on every request so a
    # container restart (and IP change) never produces stale 502s.
    # valid=10s: re-query every 10 s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    sendfile   on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout    65;
    keepalive_requests   10000;
    client_max_body_size 50M;

    # ── Gzip compression ────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_comp_level  5;
    gzip_static      on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/wasm
        font/woff2;

    # ── Rate limiting zones ──────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m       rate=50r/s;
    limit_req_zone  $binary_remote_addr zone=admin:10m     rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=webhooks:10m  rate=1r/s;
    # Telemetry: web-vitals fire 5+ per page-load; client-errors can burst
    # during error storms. 120r/m (2/s average) absorbs normal usage without
    # triggering 429s that show as "Too many requests" toasts in the UI.
    limit_req_zone  $binary_remote_addr zone=telemetry:10m rate=120r/m;
    limit_req_status 429;

    # ── Connection limit (DDoS guard) ────────────────────────────
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── File descriptor cache ────────────────────────────────────
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;

    # ── Upstream keepalive pool ──────────────────────────────────
    # Keeps TCP connections to Django alive, eliminating per-request
    # TCP handshake overhead. Requires proxy_http_version 1.1 below.
    upstream django {
        server backend:8000;
        keepalive 32;
    }

    # ── Cache policy map (hashed assets = immutable) ─────────────
    map $request_uri $cache_control {
        default                                                           "no-cache";
        "~*\\.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)(?:\\?.*)?$"  "public, max-age=31536000, immutable";
    }

    # ── TLS session cache shared across all worker processes ──────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    # ────────────────────────────────────────────────────────────────
    # Port 80 — permanent redirect to HTTPS
    # ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Internal health check for Docker
        location = /nginx-health {
            access_log off;
            return 200 "ok";
        }

        # Permanent redirect to HTTPS (308 preserves POST method)
        location / {
            return 308 https://$host$request_uri;
        }
    }

    # ────────────────────────────────────────────────────────────────
    # Port 443 — HTTPS + HTTP/2
    # ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name localhost;

        # ── TLS certificate (generated by mkcert) ────────────────
        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        # ── Modern TLS settings ───────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_buffer_size           4k;

        # ── Security headers ──────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Common proxy settings ─────────────────────────────────
        # proxy_connect_timeout 5s: fail fast if the backend is
        # unreachable — prevents the browser connection-pool exhaustion
        # that caused 60-second page hangs.
        proxy_connect_timeout  5s;
        proxy_read_timeout     300s;
        proxy_http_version     1.1;
        proxy_set_header       Connection       "";
        proxy_set_header       Host             $host;
        proxy_set_header       X-Real-IP        $remote_addr;
        proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;

        # ── Proxy response buffering ──────────────────────────────
        proxy_buffering        on;
        proxy_buffers          16 16k;
        proxy_buffer_size      32k;
        proxy_busy_buffers_size 64k;

        # ── Limit concurrent connections per IP ───────────────────
        limit_conn perip 100;

        # ── Health probe ──────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Nginx stub status (localhost only) ────────────────────
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            deny  all;
            access_log off;
        }

        # ── Angular frontend (static files from volume) ───────────
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html =404;
            add_header Cache-Control $cache_control always;
        }

        # ── Telemetry endpoints (own lenient zone, no error toast) ─
        # These are fire-and-forget beacons. A 429 here is silently
        # dropped client-side; the UI must never show a toast for them.
        location ~ ^/api/telemetry/ {
            limit_req zone=telemetry burst=60 nodelay;
            set $backend "http://django";
            proxy_pass $backend;
        }

        # ── Django REST API proxy ─────────────────────────────────
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            set $backend "http://django";
            proxy_pass $backend;
        }

        # ── Webhook endpoints (stricter rate limit) ───────────────
        location /api/sync/webhooks/ {
            limit_req zone=webhooks burst=5 nodelay;
            set $backend "http://django";
            proxy_pass $backend;
            proxy_read_timeout 60s;
        }

        # ── Django Admin proxy (rate-limited) ─────────────────────
        location /admin/ {
            limit_req zone=admin burst=10 nodelay;
            set $backend "http://django";
            proxy_pass $backend;
        }

        # ── WebSocket proxy (Django Channels) ────────────────────
        # 65s timeout: Channels sends a ping every 30s. Missing 2
        # consecutive pings (65s) signals a dead connection cleanly.
        location /ws/ {
            set $backend "http://django";
            proxy_pass $backend;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout          65s;
        }

        # ── Django static files ───────────────────────────────────
        location /static/ {
            alias     /usr/share/nginx/html/static/;
            access_log off;
            expires   30d;
            add_header Cache-Control "public, immutable";
        }

        # ── User-uploaded media ───────────────────────────────────
        location /media/ {
            alias   /usr/share/nginx/html/media/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Fonts (long-lived immutable cache) ────────────────────
        location ~* \.(woff2?)$ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Service Worker manifests (short-lived) ────────────────
        location ~* \.(webmanifest|ngsw\.json)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # ── Maintenance fallback on upstream errors ───────────────
        error_page 502 503 /maintenance.html;
        location = /maintenance.html {
            root      /usr/share/nginx/html;
            internal;
            add_header Cache-Control "no-cache";
        }
    }
}
