worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── Gzip compression for text assets ──────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/wasm
        font/woff2;

    # ── Rate limiting zones ────────────────────────────────────
    # Same shape as dev (nginx.conf). Prod keeps the same
    # headroom so operators do not hit 503s on heavy pages.
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=1r/s;

    # ── Map hashed vs non-hashed asset cache policy ─────────────
    # Angular emits filenames like main-7HCBKEKM.js with a content
    # hash — safe to cache forever. index.html must never be
    # cached because it pins the hashes for the current build.
    map $request_uri $cache_control {
        default                     "no-cache";
        "~*\.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)(?:\?.*)?$"  "public, max-age=31536000, immutable";
    }

    server {
        listen 80;
        server_name localhost;

        # ── Security headers ─────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health probe ─────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Angular frontend (static files served from volume) ───
        # The frontend-build container publishes the production
        # bundle into the shared `frontend_dist` volume, which is
        # mounted read-only at /usr/share/nginx/html.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html =404;
            add_header Cache-Control $cache_control always;
        }

        # ── Django REST API proxy ─────────────────────────────────
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── Webhook endpoints (stricter rate limit) ───────────────
        location /api/sync/webhooks/ {
            limit_req zone=webhooks burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Django Admin proxy (rate-limited) ─────────────────────
        location /admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket proxy (Django Channels) ────────────────────
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Django static/media files ─────────────────────────────
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}
