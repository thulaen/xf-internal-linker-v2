worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip compression for faster frontend delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting zones
    #
    # The /api/ zone is sized for a realtime operator dashboard: a single
    # signed-in user may open a page that fires 30+ parallel requests
    # (e.g. Settings forkJoin) while the toolbar is already polling in the
    # background every few minutes for pulse, health, metrics, pending
    # counts, webhooks, and errors. 10r/s + burst=20 was too tight — the
    # tail of every page load hit 503s.
    #
    # 50r/s + burst=100 gives a local dev machine enough headroom to feel
    # live (GlitchTip and other realtime widgets depend on this) while
    # still catching runaway client loops. Keep the admin and webhook
    # zones stricter because those are public-ish attack surface.
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=1r/s;

    server {
        listen 80;
        server_name localhost;

        # ── Security headers ─────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Health probe — always 200, no Angular build required
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Angular frontend (dev server proxy) ──────────────────
        location / {
            proxy_pass http://frontend:4200;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # ── Django REST API proxy ─────────────────────────────────
        # burst=100 absorbs the thundering herd when a heavy page like
        # Settings opens (27 forkJoin calls) on top of the shell's
        # already-running polls. Paired with rate=50r/s in the zone.
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── Webhook endpoints (stricter rate limit) ───────────────
        location /api/sync/webhooks/ {
            limit_req zone=webhooks burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Django Admin proxy (rate-limited) ─────────────────────
        location /admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket proxy (Django Channels) ────────────────────
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Django static/media files ─────────────────────────────
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}
