<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XF Internal Linker — Briefly Unavailable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f8f9fa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #202124;
    }
    .card {
      text-align: center; padding: 48px 64px; background: #fff;
      border: 0.8px solid #dadce0; border-radius: 12px; max-width: 480px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 400; margin-bottom: 12px; }
    p  { font-size: 14px; color: #5f6368; line-height: 1.6; }
    .retry {
      display: inline-block; margin-top: 24px; padding: 10px 24px;
      background: #1a73e8; color: #fff; border-radius: 4px;
      text-decoration: none; font-size: 14px; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚙️</div>
    <h1>Briefly unavailable</h1>
    <p>The backend is restarting or temporarily unreachable.<br>This usually resolves in a few seconds.</p>
    <a class="retry" href="/">Try again</a>
  </div>
</body>
</html>
