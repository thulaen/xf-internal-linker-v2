services:

  # ─────────────────────────────────────────────
  # PostgreSQL 17 with pgvector extension
  # All application data + embeddings live here
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: xf_linker_postgres
    restart: always
    mem_limit: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xf_linker}
      POSTGRES_USER: ${POSTGRES_USER:-xf_linker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xf_linker_user} -d ${POSTGRES_DB:-xf_linker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 — cache + Celery broker + WebSocket
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: xf_linker_redis
    restart: always
    mem_limit: 640m
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Django 5.2 LTS backend + Daphne ASGI server
  # REST API + WebSockets
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xf-linker-backend:latest
    container_name: xf_linker_backend
    restart: always
    mem_limit: 2560m
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      HOME: /tmp
      HTTP_WORKER_ENABLED: "true"
      HTTP_WORKER_URL: http://http-worker-api:8080
      HTTP_WORKER_SCHEMA_VERSION: v1
      SCHEDULER_CONTROL_TOKEN: ${SCHEDULER_CONTROL_TOKEN:-scheduler-control-token}
      CELERY_BEAT_RUNTIME_ENABLED: "false"
      HEAVY_RUNTIME_OWNER: celery
      RUNTIME_OWNER_BROKEN_LINK_SCAN: csharp
      RUNTIME_OWNER_GRAPH_SYNC: csharp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
    volumes:
      - ./backend:/app
      - .:/repo:ro
      - media_files:/app/media
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -c 'import drf_spectacular' &&
             (cd extensions && python setup.py build_ext --inplace) &&
             until python manage.py migrate --noinput; do
               echo 'Postgres is not ready yet. Waiting 5 seconds...';
               sleep 5;
             done &&
             python manage.py collectstatic --noinput &&
             python -m uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --workers 2"

  # ─────────────────────────────────────────────
  # Celery worker — CPU-bound ML jobs (default)
  # Handles: import, embed, pipeline, ranking
  # ─────────────────────────────────────────────
  celery-worker:
    image: xf-linker-backend:latest
    container_name: xf_linker_celery_worker
    restart: always
    mem_limit: 3g
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      HOME: /tmp
      HTTP_WORKER_ENABLED: "true"
      HTTP_WORKER_URL: http://http-worker-api:8080
      HTTP_WORKER_SCHEMA_VERSION: v1
      SCHEDULER_CONTROL_TOKEN: ${SCHEDULER_CONTROL_TOKEN:-scheduler-control-token}
      CELERY_BEAT_RUNTIME_ENABLED: "false"
      HEAVY_RUNTIME_OWNER: celery
      RUNTIME_OWNER_BROKEN_LINK_SCAN: csharp
      RUNTIME_OWNER_GRAPH_SYNC: csharp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
    volumes:
      - ./backend:/app
      - .:/repo:ro
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -t 10 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -c 'import drf_spectacular' &&
             celery -A config.celery worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4} --prefetch-multiplier 1 -Q default,pipeline,embeddings"

  # ─────────────────────────────────────────────
  # Celery Beat — scheduled tasks (auto-resync, etc.)
  # ─────────────────────────────────────────────
  # ─────────────────────────────────────────────
  # Nginx — serves Angular production build
  # Proxies /api/ and /ws/ to Django backend
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xf_linker_nginx
    restart: always
    mem_limit: 128m
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/nginx-health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Angular Frontend (Development) — Port 4200
  # Live reload enabled via volume mapping
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xf_linker_frontend
    restart: always
    mem_limit: 1g
    environment:
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4200/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s
    depends_on:
      backend:
        condition: service_healthy

  http-worker-api:
    build:
      context: ./services/http-worker
      dockerfile: Dockerfile
    image: xf-linker-http-worker:latest
    container_name: xf_linker_http_worker_api
    restart: always
    mem_limit: 384m
    environment:
      SERVICE_MODE: api
      HttpWorker__Redis__ConnectionString: redis:6379
      HttpWorker__Redis__JobQueueKey: http_worker:jobs
      HttpWorker__Redis__ResultTtlSeconds: 3600
      HttpWorker__Redis__DeadLetterTtlSeconds: 86400
      HttpWorker__Http__DefaultTimeoutSeconds: 30
      HttpWorker__Http__MaxConcurrency: 25
      HttpWorker__Http__MaxBodyBytes: 5242880
      HttpWorker__Http__MaxRedirectHops: 3
      HttpWorker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-xf_linker};Username=${POSTGRES_USER:-xf_linker_user};Password=${POSTGRES_PASSWORD:-changeme};Pooling=true;Maximum Pool Size=30
      HttpWorker__Scheduler__Enabled: "true"
      HttpWorker__Scheduler__OwnershipMode: active
      HttpWorker__Scheduler__PollSeconds: 30
      HttpWorker__Scheduler__ControlPlaneBaseUrl: http://backend:8000
      HttpWorker__Scheduler__ControlPlaneToken: ${SCHEDULER_CONTROL_TOKEN:-scheduler-control-token}
      HttpWorker__Progress__StreamPrefix: runtime:progress
      HttpWorker__Progress__StreamTtlSeconds: 3600
      HttpWorker__Progress__MaxLen: 512
      HttpWorker__SchemaVersion: v1
      HttpWorker__Auth__InternalToken: ${HTTP_WORKER_INTERNAL_TOKEN:-changeme-generate-a-real-token}
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  http-worker-queue:
    image: xf-linker-http-worker:latest
    container_name: xf_linker_http_worker_queue
    restart: always
    mem_limit: 768m
    environment:
      SERVICE_MODE: worker
      HttpWorker__Redis__ConnectionString: redis:6379
      HttpWorker__Redis__JobQueueKey: http_worker:jobs
      HttpWorker__Redis__ResultTtlSeconds: 3600
      HttpWorker__Redis__DeadLetterTtlSeconds: 86400
      HttpWorker__Http__DefaultTimeoutSeconds: 30
      HttpWorker__Http__MaxConcurrency: 25
      HttpWorker__Http__MaxBodyBytes: 5242880
      HttpWorker__Http__MaxRedirectHops: 3
      HttpWorker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-xf_linker};Username=${POSTGRES_USER:-xf_linker_user};Password=${POSTGRES_PASSWORD:-changeme};Pooling=true;Maximum Pool Size=30
      HttpWorker__Scheduler__Enabled: "true"
      HttpWorker__Scheduler__OwnershipMode: active
      HttpWorker__Scheduler__PollSeconds: 30
      HttpWorker__Scheduler__ControlPlaneBaseUrl: http://backend:8000
      HttpWorker__Scheduler__ControlPlaneToken: ${SCHEDULER_CONTROL_TOKEN:-scheduler-control-token}
      HttpWorker__Progress__StreamPrefix: runtime:progress
      HttpWorker__Progress__StreamTtlSeconds: 3600
      HttpWorker__Progress__MaxLen: 512
      HttpWorker__SchemaVersion: v1
      HttpWorker__Auth__InternalToken: ${HTTP_WORKER_INTERNAL_TOKEN:-changeme-generate-a-real-token}
    healthcheck:
      test: ["CMD-SHELL", "grep -ql dotnet /proc/*/comm 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # GlitchTip — self-hosted error tracking
  # Sentry-compatible. Reuses existing postgres + redis.
  # Access the dashboard at http://localhost:1337
  # ─────────────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:v4
    container_name: xf_linker_glitchtip
    restart: always
    mem_limit: 256m
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-xf_linker_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-xf_linker}
      REDIS_URL: redis://redis:6379/4
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production-glitchtip}
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:1337
      DEFAULT_FROM_EMAIL: glitchtip@localhost
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    ports:
      - "127.0.0.1:1337:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  media_files:
    driver: local
  frontend_dist:
    driver: local
  staticfiles:
    driver: local
