# ═══════════════════════════════════════════════════════════════════
# XF Internal Linker V2 — Single prod-only compose stack
#
# HOW TO USE:
#   docker compose --env-file .env up --build
#
# WHY NO DEV MODE:
#   The previous split (dev docker-compose.yml + docker-compose.prod.yml
#   override) was retired on 2026-04-22. Local development now runs
#   against the same prod Angular bundle + production Django settings
#   as a live deployment, so any measurement or screenshot taken while
#   working matches what operators actually see. See
#   `docs/PERFORMANCE.md §12` and `docs/DELETED-FEATURES.md` for the
#   decision record.
#
# OPTIONAL PROFILES:
#   docker compose --profile debug up    → adds GlitchTip error tracking
# ═══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 17 with pgvector extension
  # All application data + embeddings live here
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: xf_linker_postgres
    restart: always
    mem_limit: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xf_linker}
      POSTGRES_USER: ${POSTGRES_USER:-xf_linker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xf_linker_user} -d ${POSTGRES_DB:-xf_linker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 — cache + Celery broker + WebSocket
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: xf_linker_redis
    restart: always
    mem_limit: 640m
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Django 5.2 LTS backend — production settings + Daphne/uvicorn ASGI
  # No --reload (per-request overhead), 4 workers.
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xf-linker-backend:latest
    container_name: xf_linker_backend
    restart: always
    mem_limit: 2560m
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      # The nginx sidecar terminates HTTP on :80. For a local prod run
      # we are NOT behind HTTPS, so relax the HTTPS-only defaults from
      # production.py. A real HTTPS deployment should remove these
      # overrides (or set them to True/longer HSTS) via .env.
      DJANGO_SECURE_SSL_REDIRECT: "${DJANGO_SECURE_SSL_REDIRECT:-False}"
      DJANGO_SESSION_COOKIE_SECURE: "${DJANGO_SESSION_COOKIE_SECURE:-False}"
      DJANGO_CSRF_COOKIE_SECURE: "${DJANGO_CSRF_COOKIE_SECURE:-False}"
      DJANGO_SECURE_HSTS_SECONDS: "${DJANGO_SECURE_HSTS_SECONDS:-0}"
      HOME: /tmp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
    volumes:
      - ./backend:/app
      - .:/repo:ro
      - media_files:/app/media
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -c 'import drf_spectacular' &&
             (cd extensions && python setup.py build_ext --inplace) &&
             until python manage.py migrate --noinput; do
               echo 'Postgres is not ready yet. Waiting 5 seconds...';
               sleep 5;
             done &&
             python manage.py collectstatic --noinput &&
             python -m uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4"

  # ─────────────────────────────────────────────
  # Celery worker - default queue only
  # Handles: light background jobs that are safe to parallelise
  # ─────────────────────────────────────────────
  celery-worker-default:
    image: xf-linker-backend:latest
    container_name: xf_linker_celery_worker_default
    restart: always
    mem_limit: 1536m
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      HOME: /tmp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
    volumes:
      - ./backend:/app
      - .:/repo:ro
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME -t 10 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -c 'import drf_spectacular' &&
             DEFAULT_QUEUE_CONCURRENCY=$$(python manage.py print_default_queue_concurrency) &&
             celery -A config.celery worker --loglevel=warning --concurrency=$${DEFAULT_QUEUE_CONCURRENCY:-2} --prefetch-multiplier 1 -Q default"

  # Celery worker - pipeline + embeddings queues only
  # Handles: heavy serial work that must stay single-process for FAISS correctness
  celery-worker-pipeline:
    image: xf-linker-backend:latest
    container_name: xf_linker_celery_worker_pipeline
    restart: always
    mem_limit: 2g
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      HOME: /tmp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
      CELERY_WORKER_CONCURRENCY: 1
    volumes:
      - ./backend:/app
      - .:/repo:ro
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME -t 10 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -c 'import drf_spectacular' &&
             celery -A config.celery worker --loglevel=warning --concurrency=1 --prefetch-multiplier 1 -Q pipeline,embeddings"

  # ─────────────────────────────────────────────
  # Celery Beat — scheduled tasks (auto-resync, etc.)
  # ─────────────────────────────────────────────
  celery-beat:
    image: xf-linker-backend:latest
    container_name: xf_linker_celery_beat
    restart: always
    mem_limit: 128m
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      HOME: /tmp
      RUNTIME_PROGRESS_STREAM_PREFIX: runtime:progress
      REPO_ROOT: /repo
    volumes:
      - ./backend:/app
      - .:/repo:ro
    healthcheck:
      test: ["CMD-SHELL", "grep -q beat /proc/1/cmdline || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A config.celery beat --loglevel=warning
             --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  # ─────────────────────────────────────────────
  # Angular prod bundle build — runs once, publishes to volume, exits
  # Multi-stage Dockerfile compiles with `ng build --configuration=production`
  # and copies the output to /dist (the shared `frontend_dist` volume).
  # Nginx depends on this via service_completed_successfully.
  # ─────────────────────────────────────────────
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: xf-linker-frontend-prod:latest
    container_name: xf_linker_frontend_build
    restart: "no"
    mem_limit: 2g
    volumes:
      - frontend_dist:/dist

  # ─────────────────────────────────────────────
  # Nginx — serves the Angular prod bundle + proxies /api/ and /ws/
  # Long-cache headers on hashed assets via nginx.prod.conf.
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xf_linker_nginx
    restart: always
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # TLS certificate + private key — read-only inside the container.
      # Generated on the developer's machine by mkcert (see docs/DEV-HTTPS.md).
      - ./nginx/certs:/etc/nginx/certs:ro
      # Static maintenance page served on 502/503 before Angular boots.
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      # `frontend_dist` mounted RW (not `:ro`) because the child volumes
      # below sit on subdirectories inside this tree, and Docker cannot
      # create a mountpoint inside a read-only parent. Nginx runs as an
      # unprivileged user with no write permission on the files anyway.
      - frontend_dist:/usr/share/nginx/html
      - staticfiles:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/nginx-health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # GlitchTip — self-hosted error tracking (opt-in via --profile debug)
  # Sentry-compatible. Reuses existing postgres + redis.
  # Access the dashboard at http://localhost:1337
  # ─────────────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: xf_linker_glitchtip
    restart: always
    mem_limit: 256m
    profiles: ["debug"]
    # NOTE: do NOT add `env_file: .env` here. The project .env sets
    # DJANGO_SETTINGS_MODULE for the backend, which would collide with
    # GlitchTip's own Django settings and crash it with
    # `ModuleNotFoundError: No module named 'config'`.
    # GlitchTip runs against its own `/glitchtip` DB, isolated from the
    # linker's `${POSTGRES_DB}`, so its migrations never touch our tables.
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-xf_linker_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/glitchtip"
      REDIS_URL: redis://redis:6379/4
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:-change-me-in-production-glitchtip}"
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:1337
      DEFAULT_FROM_EMAIL: glitchtip@localhost
      ENABLE_USER_REGISTRATION: "true"
      PORT: "8000"
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    ports:
      - "127.0.0.1:1337:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # GlitchTip Worker — processes error events (opt-in with GlitchTip)
  # ─────────────────────────────────────────────
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: xf_linker_glitchtip_worker
    restart: always
    mem_limit: 256m
    profiles: ["debug"]
    command: ./bin/run-celery-with-beat.sh
    # Same env_file caveat as glitchtip above — keep this isolated from
    # the linker .env. Uses the same `/glitchtip` DB.
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-xf_linker_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/glitchtip"
      REDIS_URL: redis://redis:6379/4
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:-change-me-in-production-glitchtip}"
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:1337
      DEFAULT_FROM_EMAIL: glitchtip@localhost
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  media_files:
    driver: local
  frontend_dist:
    driver: local
  staticfiles:
    driver: local
