services:

  # ─────────────────────────────────────────────
  # PostgreSQL 17 with pgvector extension
  # All application data + embeddings live here
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: xf_linker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xf_linker}
      POSTGRES_USER: ${POSTGRES_USER:-xf_linker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xf_linker_user} -d ${POSTGRES_DB:-xf_linker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 — cache + Celery broker + WebSocket
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: xf_linker_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Django 5.2 LTS backend + Daphne ASGI server
  # REST API + WebSockets
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xf_linker_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ─────────────────────────────────────────────
  # Celery worker — CPU-bound ML jobs (default)
  # Handles: import, embed, pipeline, ranking
  # ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xf_linker_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2} -Q default,pipeline,embeddings

  # ─────────────────────────────────────────────
  # Celery Beat — scheduled tasks (auto-resync, etc.)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xf_linker_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─────────────────────────────────────────────
  # Nginx — serves Angular production build
  # Proxies /api/ and /ws/ to Django backend
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xf_linker_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  http-worker-api:
    build:
      context: ./services/http-worker
      dockerfile: Dockerfile
    container_name: xf_linker_http_worker_api
    restart: unless-stopped
    environment:
      SERVICE_MODE: api
      HttpWorker__Redis__ConnectionString: redis:6379
      HttpWorker__Redis__JobQueueKey: http_worker:jobs
      HttpWorker__Redis__ResultTtlSeconds: 3600
      HttpWorker__Redis__DeadLetterTtlSeconds: 86400
      HttpWorker__Http__DefaultTimeoutSeconds: 30
      HttpWorker__Http__MaxConcurrency: 100
      HttpWorker__Http__MaxBodyBytes: 5242880
      HttpWorker__Http__MaxRedirectHops: 3
      HttpWorker__SchemaVersion: v1
    ports:
      - "8081:8080"
    depends_on:
      redis:
        condition: service_healthy

  http-worker-queue:
    build:
      context: ./services/http-worker
      dockerfile: Dockerfile
    container_name: xf_linker_http_worker_queue
    restart: unless-stopped
    environment:
      SERVICE_MODE: worker
      HttpWorker__Redis__ConnectionString: redis:6379
      HttpWorker__Redis__JobQueueKey: http_worker:jobs
      HttpWorker__Redis__ResultTtlSeconds: 3600
      HttpWorker__Redis__DeadLetterTtlSeconds: 86400
      HttpWorker__Http__DefaultTimeoutSeconds: 30
      HttpWorker__Http__MaxConcurrency: 100
      HttpWorker__Http__MaxBodyBytes: 5242880
      HttpWorker__Http__MaxRedirectHops: 3
      HttpWorker__SchemaVersion: v1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  media_files:
    driver: local
  frontend_dist:
    driver: local
